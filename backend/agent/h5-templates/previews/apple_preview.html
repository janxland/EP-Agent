<!DOCTYPE html>
<html lang="zh-CN">
<!--
  EP-Agent H5 模板：苹果风格（Apple）
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  可替换变量（ 格式）：
    坠落星空        — 曲名
    EP-Agent     — 作曲者
    120          — 速度
    C 大调          — 调号
    5   — 音符数
    0:02     — 时长字符串 (mm:ss)
    ABC Notation — 格式标签 (MIDI/ABC/Sky JSON)
    [{"pitch": "E4", "time_ms": 0, "duration_ms": 400}, {"pitch": "G4", "time_ms": 400, "duration_ms": 400}, {"pitch": "A4", "time_ms": 800, "duration_ms": 600}, {"pitch": "C5", "time_ms": 1400, "duration_ms": 800}, {"pitch": "B4", "time_ms": 2200, "duration_ms": 400}]   — 音符数据 JSON 数组字符串
    [1.0, 0.05, 0.05, 0.05, 0.05, 0.05, 1.0, 0.05, 0.05, 0.05, 0.05, 0.05, 1.0, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 1.0, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 1.0, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05]— 波形数据 JSON 数组字符串
    X:1\nT:\u5760\u843d\u661f\u7a7a\nM:4/4\nK:C\nEGAc B2|  — ABC Notation 字符串（JSON转义后）
         — MIDI base64 字符串（可选，留空则不嵌入）
        — 视频链接（可选，留空则不显示视频区）
       — 额外说明文字
    apple        — 主题变体: dark | light
    #FF375F — 强调色 hex，如 #FF375F
    #0A0A0F     — 背景色 hex，如 #0A0A0F
    rgba(28,28,30,0.85)      — 卡片背景 rgba
    #FFFFFF   — 主文字色
    rgba(255,255,255,0.55)     — 次要文字色 rgba
    linear-gradient(135deg, #1a0010 0%, #0A0A0F 50%, #001020 100%)     — 背景渐变 CSS 值
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0F">
<title>坠落星空 — EP-Agent</title>
<meta property="og:title" content="坠落星空">
<meta property="og:description" content="5 音符 · 0:02 · ABC Notation">
<script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.4.4/abcjs-basic-min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0A0A0F;
  --card-bg:    rgba(28,28,30,0.85);
  --text:       #FFFFFF;
  --text-sub:   rgba(255,255,255,0.55);
  --accent:     #FF375F;
  --gradient:   linear-gradient(135deg, #1a0010 0%, #0A0A0F 50%, #001020 100%);
  --blur:       20px;
  --border:     rgba(255,255,255,0.08);
  --pill-bg:    rgba(255,255,255,0.10);
  --safe-top:   env(safe-area-inset-top, 0px);
  --safe-bot:   env(safe-area-inset-bottom, 0px);
}

/* ── 门户预加载动画 ── */
#preloader {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 20px;
  transition: opacity 0.8s ease, transform 0.8s ease;
}
#preloader.hide { opacity: 0; transform: scale(1.05); pointer-events: none; }
.preloader-logo {
  width: 72px; height: 72px; border-radius: 22px;
  background: linear-gradient(135deg, var(--accent), color-mix(in srgb, var(--accent) 60%, #fff));
  display: flex; align-items: center; justify-content: center;
  font-size: 36px;
  animation: logoPulse 1.5s ease-in-out infinite;
  box-shadow: 0 0 40px color-mix(in srgb, var(--accent) 50%, transparent);
}
@keyframes logoPulse {
  0%,100% { transform: scale(1); box-shadow: 0 0 40px color-mix(in srgb,var(--accent) 50%,transparent); }
  50%      { transform: scale(1.08); box-shadow: 0 0 60px color-mix(in srgb,var(--accent) 70%,transparent); }
}
.preloader-bar-wrap {
  width: 160px; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden;
}
.preloader-bar {
  height: 100%; width: 0%; background: var(--accent); border-radius: 2px;
  transition: width 0.05s linear;
}
.preloader-text { font-size: 13px; color: var(--text-sub); letter-spacing: 0.08em; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display",
               "PingFang SC", "Helvetica Neue", sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── 封面层 ── */
.cover-layer {
  position: fixed; top: 0; left: 0; right: 0; height: 100dvh;
  background: var(--gradient);
  z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: calc(var(--safe-top) + 20px) 24px calc(var(--safe-bot) + 44px);
  transition: transform 0.6s cubic-bezier(0.32,0.72,0,1),
              opacity   0.6s cubic-bezier(0.32,0.72,0,1);
  will-change: transform, opacity;
  overflow: hidden;
  opacity: 0; /* 初始隐藏，preloader 消失后淡入 */
}
.cover-layer.visible { opacity: 1; }
.cover-layer.pulled  { transform: translateY(-100%); opacity: 0; pointer-events: none; }

.cover-bg-canvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.3; }

.cover-content { position: relative; z-index: 2; width: 100%; max-width: 420px; text-align: center; }

/* 旋转唱片 */
.cover-disc {
  width: 168px; height: 168px; border-radius: 50%;
  background: conic-gradient(var(--accent) 0deg, color-mix(in srgb,var(--accent) 50%,#fff) 180deg, var(--accent) 360deg);
  margin: 0 auto 28px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 80px color-mix(in srgb,var(--accent) 45%,transparent), 0 24px 60px rgba(0,0,0,0.5);
  animation: discSpin 10s linear infinite paused;
  position: relative;
}
.cover-disc.playing { animation-play-state: running; }
.cover-disc::after {
  content: ""; position: absolute;
  width: 52px; height: 52px; border-radius: 50%;
  background: var(--bg); box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
}
@keyframes discSpin { to { transform: rotate(360deg); } }

.cover-title {
  font-size: clamp(22px,6vw,34px); font-weight: 700;
  letter-spacing: -0.02em; line-height: 1.15; margin-bottom: 6px;
}
.cover-composer { font-size: 15px; color: var(--text-sub); margin-bottom: 22px; }

.pills-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 28px; }
.pill {
  padding: 5px 14px; border-radius: 20px;
  background: var(--pill-bg); border: 1px solid var(--border);
  font-size: 12px; font-weight: 600; color: var(--accent);
  letter-spacing: 0.04em;
  backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
}
.pill.sub { color: var(--text-sub); font-weight: 500; }

/* 波形 */
.waveform-wrap {
  width: 100%; height: 56px;
  display: flex; align-items: flex-end; gap: 2px;
  margin-bottom: 24px; padding: 0 4px;
  background: rgba(255,255,255,0.05); border-radius: 14px; overflow: hidden;
}
.wave-bar { flex: 1; background: var(--accent); border-radius: 2px 2px 0 0; opacity: 0.65; min-height: 3px; transition: opacity 0.1s; }
.wave-bar.active { opacity: 1; }

/* 播放控件 */
.player-controls { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 28px; }
.ctrl-btn {
  width: 50px; height: 50px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
  background: var(--pill-bg); color: var(--text);
  transition: transform 0.15s, opacity 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn:active { transform: scale(0.88); opacity: 0.7; }
.ctrl-btn.primary {
  width: 68px; height: 68px; font-size: 28px;
  background: var(--accent); color: #fff;
  box-shadow: 0 10px 30px color-mix(in srgb,var(--accent) 45%,transparent);
}

/* 下拉提示 */
.pull-hint {
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  color: var(--text-sub); font-size: 12px; letter-spacing: 0.04em;
  animation: hintBounce 2.2s ease-in-out infinite;
}
.pull-arrow {
  width: 26px; height: 26px;
  border-left: 2px solid var(--text-sub); border-bottom: 2px solid var(--text-sub);
  transform: rotate(-45deg) translateY(-4px);
}
@keyframes hintBounce {
  0%,100% { transform: translateY(0); opacity: 0.5; }
  50%      { transform: translateY(7px); opacity: 1; }
}

/* ── 详情层 ── */
.detail-layer { position: relative; z-index: 1; padding-top: 100dvh; min-height: 200dvh; background: var(--bg); }
.detail-inner { padding: 40px 20px calc(var(--safe-bot) + 60px); max-width: 480px; margin: 0 auto; }

.card {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 22px; padding: 20px; margin-bottom: 16px;
  backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
  opacity: 0; transform: translateY(24px);
  transition: opacity 0.5s ease, transform 0.5s ease;
}
.card.visible { opacity: 1; transform: translateY(0); }

.section-title {
  font-size: 12px; font-weight: 600; color: var(--text-sub);
  text-transform: uppercase; letter-spacing: 0.10em; margin-bottom: 14px;
}
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.meta-item { display: flex; align-items: center; gap: 10px; font-size: 14px; }
.meta-icon { font-size: 18px; }
.meta-label { color: var(--text-sub); font-size: 11px; margin-top: 2px; }

/* 音符瀑布 */
.notes-waterfall { height: 120px; border-radius: 14px; background: rgba(255,255,255,0.04); overflow: hidden; }
.notes-canvas { width: 100%; height: 100%; }

/* ABC 乐谱 */
.abc-output {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 18px; padding: 16px; overflow-x: auto;
}
.abc-output svg { max-width: 100%; filter: invert(1) brightness(0.9); }

/* 视频区 */
.video-wrap { border-radius: 18px; overflow: hidden; background: #000; aspect-ratio: 16/9; }
.video-wrap video { width: 100%; height: 100%; object-fit: cover; }

/* 分享 */
.share-section { text-align: center; padding: 24px 0 0; }
.share-btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 15px 36px; border-radius: 50px;
  background: var(--accent); color: #fff;
  font-size: 15px; font-weight: 600; border: none; cursor: pointer;
  box-shadow: 0 10px 28px color-mix(in srgb,var(--accent) 40%,transparent);
  transition: transform 0.15s; -webkit-tap-highlight-color: transparent;
}
.share-btn:active { transform: scale(0.95); }
.brand-tag { margin-top: 14px; font-size: 12px; color: var(--text-sub); letter-spacing: 0.04em; }

/* 返回封面按钮 */
.back-btn {
  position: fixed; bottom: calc(var(--safe-bot) + 24px); right: 20px;
  z-index: 200; width: 46px; height: 46px; border-radius: 50%;
  background: var(--card-bg); border: 1px solid var(--border);
  backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer;
  opacity: 0; transform: translateY(12px);
  transition: opacity 0.3s, transform 0.3s;
  -webkit-tap-highlight-color: transparent;
}
.back-btn.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<!-- 门户预加载 -->
<div id="preloader">
  <div class="preloader-logo">🎵</div>
  <div class="preloader-bar-wrap"><div class="preloader-bar" id="preBar"></div></div>
  <div class="preloader-text">正在加载乐谱...</div>
</div>

<div class="page-wrapper" id="pageWrapper">

  <!-- 封面层 -->
  <div class="cover-layer" id="coverLayer">
    <canvas class="cover-bg-canvas" id="bgCanvas"></canvas>
    <div class="cover-content">
      <div class="cover-disc" id="coverDisc"></div>
      <div class="cover-title">坠落星空</div>
      <div class="cover-composer">EP-Agent</div>
      <div class="pills-row">
        <span class="pill">ABC Notation</span>
        <span class="pill sub">♩=120 BPM</span>
        <span class="pill sub">C 大调 调</span>
        <span class="pill">5 音符</span>
        <span class="pill sub">0:02</span>
      </div>
      <div class="waveform-wrap" id="waveformWrap"></div>
      <div class="player-controls">
        <button class="ctrl-btn" id="btnRestart">⏮</button>
        <button class="ctrl-btn primary" id="btnPlay">▶</button>
        <button class="ctrl-btn" id="btnStop">⏹</button>
      </div>
      <div class="pull-hint"><div class="pull-arrow"></div><span>下拉查看详情</span></div>
    </div>
  </div>

  <!-- 详情层 -->
  <div class="detail-layer">
    <div class="detail-inner">

      <div class="card" data-card>
        <div class="section-title">乐曲信息</div>
        <div class="meta-grid">
          <div class="meta-item"><span class="meta-icon">🎵</span>
            <div><div>坠落星空</div><div class="meta-label">曲名</div></div></div>
          <div class="meta-item"><span class="meta-icon">🎹</span><div><div>EP-Agent</div><div class="meta-label">作曲</div></div></div>
          <div class="meta-item"><span class="meta-icon">🎼</span>
            <div><div>C 大调</div><div class="meta-label">调号</div></div></div>
          <div class="meta-item"><span class="meta-icon">🥁</span>
            <div><div>120 BPM</div><div class="meta-label">速度</div></div></div>
          <div class="meta-item"><span class="meta-icon">🎹</span>
            <div><div>5</div><div class="meta-label">音符数</div></div></div>
          <div class="meta-item"><span class="meta-icon">⏱</span>
            <div><div>0:02</div><div class="meta-label">时长</div></div></div>
        </div>
        
      </div>

      <div class="card" data-card>
        <div class="section-title">音符可视化</div>
        <div class="notes-waterfall"><canvas class="notes-canvas" id="notesCanvas"></canvas></div>
      </div>

      <div class="abc-section card" data-card><h3 class="section-title">🎼 乐谱</h3><div id="abcContainer" style="filter:invert(1) brightness(0.9);margin-top:12px;overflow-x:auto;"></div></div>
      

      <div class="share-section">
        <button class="share-btn" id="shareBtn"><span>📤</span><span>分享这首乐曲</span></button>
        <div class="brand-tag">由 EP-Agent 生成 · 乐谱海报</div>
      </div>

    </div>
  </div>
</div>

<button class="back-btn" id="backBtn">↑</button>

<script>
(function() {
  'use strict';

  // ── 数据注入 ──
  const NOTES        = [{"pitch": "E4", "time_ms": 0, "duration_ms": 400}, {"pitch": "G4", "time_ms": 400, "duration_ms": 400}, {"pitch": "A4", "time_ms": 800, "duration_ms": 600}, {"pitch": "C5", "time_ms": 1400, "duration_ms": 800}, {"pitch": "B4", "time_ms": 2200, "duration_ms": 400}];
  const WAVEFORM     = [1.0, 0.05, 0.05, 0.05, 0.05, 0.05, 1.0, 0.05, 0.05, 0.05, 0.05, 0.05, 1.0, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 1.0, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 1.0, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05];
  const ABC_CONTENT  = X:1\nT:\u5760\u843d\u661f\u7a7a\nM:4/4\nK:C\nEGAc B2|;
  const BPM          = 120;
  const DURATION_MS  = 2600;
  const ACCENT       = '#FF375F';

  // ── 门户预加载 ──
  const preloader = document.getElementById('preloader');
  const preBar    = document.getElementById('preBar');
  let progress = 0;
  const loadTimer = setInterval(function() {
    progress += Math.random() * 18 + 5;
    if (progress >= 95) { clearInterval(loadTimer); progress = 95; }
    preBar.style.width = progress + '%';
  }, 80);

  window.addEventListener('load', function() {
    clearInterval(loadTimer);
    preBar.style.width = '100%';
    setTimeout(function() {
      preloader.classList.add('hide');
      setTimeout(function() {
        preloader.style.display = 'none';
        document.getElementById('coverLayer').classList.add('visible');
        // 卡片入场动画（错落）
        document.querySelectorAll('[data-card]').forEach(function(card, i) {
          setTimeout(function() { card.classList.add('visible'); }, i * 120);
        });
      }, 800);
    }, 300);
  });

  // ── 波形渲染 ──
  const waveWrap = document.getElementById('waveformWrap');
  WAVEFORM.forEach(function(h) {
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    bar.style.height = Math.max(4, Math.round(h * 52)) + 'px';
    waveWrap.appendChild(bar);
  });

  // ── Web Audio 播放器 ──
  let audioCtx = null, isPlaying = false, playStart = 0;
  let scheduledNodes = [], animFrame = null;

  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function stopAll() {
    scheduledNodes.forEach(function(n) { try { n.stop(0); } catch(e) {} });
    scheduledNodes = [];
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    isPlaying = false;
    document.getElementById('btnPlay').textContent = '▶';
    document.getElementById('coverDisc').classList.remove('playing');
    highlightWave(-1);
  }

  function playNotes(offsetMs) {
    const ctx = getCtx();
    if (ctx.state === 'suspended') ctx.resume();
    stopAll();
    const now = ctx.currentTime;
    playStart = now - offsetMs / 1000;
    isPlaying = true;
    document.getElementById('btnPlay').textContent = '⏸';
    document.getElementById('coverDisc').classList.add('playing');

    NOTES.forEach(function(note) {
      const t = note.time_ms / 1000, d = (note.duration_ms || 200) / 1000;
      if (t < offsetMs / 1000) return;
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      const freq = note.midi
        ? 440 * Math.pow(2, (note.midi - 69) / 12)
        : 440;
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now + t);
      const st = now + t;
      gain.gain.setValueAtTime(0, st);
      gain.gain.linearRampToValueAtTime(0.16, st + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, st + d);
      osc.start(st); osc.stop(st + d + 0.05);
      scheduledNodes.push(osc);
    });

    setTimeout(function() { if (isPlaying) stopAll(); },
      Math.max(1000, (DURATION_MS - offsetMs) + 500));
    animateWave();
  }

  function animateWave() {
    const bars = waveWrap.querySelectorAll('.wave-bar');
    const total = bars.length;
    if (!total) return;
    function tick() {
      if (!isPlaying) return;
      const elapsed = (getCtx().currentTime - playStart) * 1000;
      const idx = Math.floor(Math.min(elapsed / (DURATION_MS || 1), 1) * total);
      highlightWave(idx);
      animFrame = requestAnimationFrame(tick);
    }
    animFrame = requestAnimationFrame(tick);
  }

  function highlightWave(idx) {
    waveWrap.querySelectorAll('.wave-bar').forEach(function(b, i) {
      b.classList.toggle('active', i === idx);
    });
  }

  // 播放控件
  document.getElementById('btnPlay').addEventListener('click', function() {
    if (isPlaying) stopAll(); else playNotes(0);
  });
  document.getElementById('btnStop').addEventListener('click', stopAll);
  document.getElementById('btnRestart').addEventListener('click', function() {
    stopAll(); setTimeout(function() { playNotes(0); }, 50);
  });

  // ── 音符瀑布 ──
  function drawNotes() {
    const canvas = document.getElementById('notesCanvas');
    if (!canvas || !NOTES.length) return;
    const ctx2 = canvas.getContext('2d');
    const W = canvas.offsetWidth || 300, H = canvas.offsetHeight || 120;
    canvas.width = W * devicePixelRatio; canvas.height = H * devicePixelRatio;
    ctx2.scale(devicePixelRatio, devicePixelRatio);
    const maxT = NOTES.reduce(function(m, n) { return Math.max(m, n.time_ms + (n.duration_ms||200)); }, 1);
    const pitches = [...new Set(NOTES.map(function(n) { return n.midi || n.pitch; }))].sort();
    const pitchIdx = {};
    pitches.forEach(function(p, i) { pitchIdx[p] = i; });
    const rows = Math.max(pitches.length, 1);
    ctx2.clearRect(0, 0, W, H);
    NOTES.forEach(function(note) {
      const x  = (note.time_ms / maxT) * W;
      const pw = Math.max(2, ((note.duration_ms||200) / maxT) * W);
      const pi = pitchIdx[note.midi || note.pitch] || 0;
      const y  = H - ((pi / rows) * H) - 4;
      ctx2.fillStyle = ACCENT;
      ctx2.globalAlpha = 0.75;
      ctx2.beginPath();
      if (ctx2.roundRect) ctx2.roundRect(x, y, pw, 4, 2);
      else ctx2.rect(x, y, pw, 4);
      ctx2.fill();
    });
    ctx2.globalAlpha = 1;
  }

  // ── ABC 渲染 ──
  function renderAbc() {
    if (!ABC_CONTENT || !window.ABCJS) return;
    try { ABCJS.renderAbc('abcOutput', ABC_CONTENT, { responsive: 'resize' }); }
    catch(e) {}
  }

  // ── 背景粒子 ──
  function initBg() {
    const canvas = document.getElementById('bgCanvas');
    if (!canvas) return;
    const ctx3 = canvas.getContext('2d');
    let W = canvas.offsetWidth, H = canvas.offsetHeight;
    canvas.width = W; canvas.height = H;
    const particles = Array.from({length: 45}, function() {
      return { x: Math.random()*W, y: Math.random()*H,
               r: Math.random()*2.5+0.5,
               vx: (Math.random()-0.5)*0.35, vy: (Math.random()-0.5)*0.35,
               o: Math.random()*0.4+0.15 };
    });
    function draw() {
      ctx3.clearRect(0, 0, W, H);
      particles.forEach(function(p) {
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
        if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
        ctx3.beginPath(); ctx3.arc(p.x, p.y, p.r, 0, Math.PI*2);
        ctx3.fillStyle = ACCENT; ctx3.globalAlpha = p.o; ctx3.fill();
      });
      ctx3.globalAlpha = 1;
      requestAnimationFrame(draw);
    }
    draw();
    window.addEventListener('resize', function() {
      W = canvas.offsetWidth; H = canvas.offsetHeight;
      canvas.width = W; canvas.height = H;
    });
  }

  // ── 下拉手势 ──
  const coverLayer = document.getElementById('coverLayer');
  const backBtn    = document.getElementById('backBtn');
  let coverPulled = false, touchStartY = 0;

  document.addEventListener('touchstart', function(e) { touchStartY = e.touches[0].clientY; }, {passive:true});
  document.addEventListener('touchmove', function(e) {
    if (!coverPulled && e.touches[0].clientY - touchStartY < -60 && window.scrollY < 10) pullCover();
  }, {passive:true});
  document.addEventListener('wheel', function(e) {
    if (!coverPulled && e.deltaY > 80) pullCover();
  }, {passive:true});

  function pullCover() {
    if (coverPulled) return;
    coverPulled = true;
    coverLayer.classList.add('pulled');
    setTimeout(function() { window.scrollTo({top: window.innerHeight*0.5, behavior:'smooth'}); }, 200);
    backBtn.classList.add('visible');
  }

  backBtn.addEventListener('click', function() {
    coverPulled = false;
    coverLayer.classList.remove('pulled');
    window.scrollTo({top: 0, behavior:'smooth'});
    backBtn.classList.remove('visible');
  });

  window.addEventListener('scroll', function() {
    if (window.scrollY > window.innerHeight * 0.3) {
      if (!coverPulled) { coverPulled = true; coverLayer.classList.add('pulled'); }
      backBtn.classList.add('visible');
    } else {
      backBtn.classList.remove('visible');
    }
  }, {passive:true});

  // ── 分享 ──
  document.getElementById('shareBtn').addEventListener('click', function() {
    if (navigator.share) {
      navigator.share({title:'坠落星空', url: location.href}).catch(function(){});
    } else {
      navigator.clipboard.writeText(location.href).then(function() {
        document.querySelector('.share-btn span:last-child').textContent = '链接已复制！';
        setTimeout(function() {
          document.querySelector('.share-btn span:last-child').textContent = '分享这首乐曲';
        }, 2000);
      }).catch(function(){});
    }
  });

  // ── Intersection Observer 卡片入场 ──
  if ('IntersectionObserver' in window) {
    const obs = new IntersectionObserver(function(entries) {
      entries.forEach(function(e) { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
    }, {threshold: 0.15});
    document.querySelectorAll('[data-card]').forEach(function(el) { obs.observe(el); });
  }

  // ── 初始化 ──
  window.addEventListener('load', function() {
    initBg(); drawNotes(); renderAbc();
  });
  window.addEventListener('resize', drawNotes);

})();
</script>
</body>
</html>
