<!DOCTYPE html>
<html lang="zh-CN">
<!--
  EP-Agent H5 模板：初音未来（Miku）
  ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  主题色：青绿 #39C5BB / 粉紫 #FF69B4
  风格：赛博电子 + 全息投影 + 扫描线
  变量同 apple.html，额外支持：
    ♪ 坠落星空，音符飞舞 ♪ — 歌词一行（可选）
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#050F12">
<title>坠落星空 — 初音未来 × EP-Agent</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.4.4/abcjs-basic-min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --miku:    #39C5BB;
  --pink:    #FF69B4;
  --bg:      #050F12;
  --bg2:     #0A1A20;
  --text:    #E0FFFD;
  --sub:     rgba(57,197,187,0.55);
  --card:    rgba(10,30,35,0.88);
  --border:  rgba(57,197,187,0.18);
  --blur:    18px;
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bot: env(safe-area-inset-bottom,0px);
}

/* 扫描线叠层 */
body::before {
  content: "";
  position: fixed; inset: 0; z-index: 9998; pointer-events: none;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(57,197,187,0.03) 2px,
    rgba(57,197,187,0.03) 4px
  );
}

/* ── 预加载 ── */
#preloader {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 18px;
  transition: opacity 0.9s ease;
}
#preloader.hide { opacity: 0; pointer-events: none; }

.pre-logo {
  width: 80px; height: 80px;
  border-radius: 50%;
  border: 2px solid var(--miku);
  display: flex; align-items: center; justify-content: center;
  font-size: 38px;
  box-shadow: 0 0 30px var(--miku), inset 0 0 20px rgba(57,197,187,0.1);
  animation: holoPulse 1.8s ease-in-out infinite;
  position: relative;
}
.pre-logo::after {
  content: "";
  position: absolute; inset: -6px;
  border-radius: 50%;
  border: 1px solid rgba(57,197,187,0.3);
  animation: holoPulse 1.8s ease-in-out infinite reverse;
}
@keyframes holoPulse {
  0%,100% { box-shadow: 0 0 20px var(--miku), inset 0 0 15px rgba(57,197,187,0.1); }
  50%      { box-shadow: 0 0 50px var(--miku), 0 0 80px rgba(57,197,187,0.3), inset 0 0 25px rgba(57,197,187,0.2); }
}

.pre-text {
  font-size: 13px; color: var(--miku); letter-spacing: 0.2em;
  text-transform: uppercase; font-family: monospace;
  animation: blink 1s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.pre-bar-wrap { width: 200px; height: 2px; background: rgba(57,197,187,0.15); border-radius: 1px; overflow: hidden; }
.pre-bar { height: 100%; width: 0%; background: linear-gradient(90deg, var(--miku), var(--pink)); transition: width 0.05s linear; }

html, body {
  width: 100%; height: 100%;
  background: var(--bg); color: var(--text);
  font-family: -apple-system, "PingFang SC", "Helvetica Neue", monospace, sans-serif;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── 封面层 ── */
.cover-layer {
  position: fixed; inset: 0; height: 100dvh;
  z-index: 100;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: calc(var(--safe-top)+20px) 24px calc(var(--safe-bot)+44px);
  transition: transform 0.65s cubic-bezier(0.32,0.72,0,1), opacity 0.65s ease;
  will-change: transform, opacity;
  overflow: hidden;
  opacity: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(57,197,187,0.15) 0%, transparent 70%),
              radial-gradient(ellipse at 80% 80%, rgba(255,105,180,0.10) 0%, transparent 60%),
              var(--bg);
}
.cover-layer.visible { opacity: 1; }
.cover-layer.pulled  { transform: translateY(-100%); opacity: 0; pointer-events: none; }

/* 全息圆环 */
.holo-ring {
  position: absolute;
  border-radius: 50%;
  border: 1px solid rgba(57,197,187,0.25);
  animation: ringExpand 4s ease-in-out infinite;
}
.holo-ring:nth-child(1) { width: 280px; height: 280px; animation-delay: 0s; }
.holo-ring:nth-child(2) { width: 380px; height: 380px; animation-delay: 1s; }
.holo-ring:nth-child(3) { width: 480px; height: 480px; animation-delay: 2s; }
@keyframes ringExpand {
  0%,100% { opacity: 0.4; transform: scale(1); }
  50%      { opacity: 0.15; transform: scale(1.05); }
}

.cover-content { position: relative; z-index: 2; width: 100%; max-width: 400px; text-align: center; }

/* 全息头像区 */
.holo-avatar {
  width: 140px; height: 140px; margin: 0 auto 24px;
  position: relative;
}
.holo-disc {
  width: 100%; height: 100%; border-radius: 50%;
  background: conic-gradient(var(--miku) 0deg, var(--pink) 120deg, var(--miku) 240deg, var(--pink) 360deg);
  display: flex; align-items: center; justify-content: center;
  font-size: 56px;
  box-shadow: 0 0 60px rgba(57,197,187,0.5), 0 0 120px rgba(57,197,187,0.2);
  animation: discSpin 12s linear infinite paused;
}
.holo-disc.playing { animation-play-state: running; }
.holo-disc::after {
  content: ""; position: absolute;
  width: 44px; height: 44px; border-radius: 50%;
  background: var(--bg);
  box-shadow: 0 0 10px rgba(57,197,187,0.4);
}
@keyframes discSpin { to { transform: rotate(360deg); } }

/* 扫描线动画 */
.holo-avatar::before {
  content: "";
  position: absolute; left: 0; right: 0; top: -100%;
  height: 30%; background: linear-gradient(transparent, rgba(57,197,187,0.15), transparent);
  animation: scanLine 3s linear infinite;
  border-radius: 50%;
  z-index: 3;
}
@keyframes scanLine { to { top: 200%; } }

.cover-title {
  font-size: clamp(20px,5.5vw,30px);
  font-weight: 700; letter-spacing: 0.02em;
  line-height: 1.2; margin-bottom: 6px;
  text-shadow: 0 0 20px rgba(57,197,187,0.6);
}
.cover-sub { font-size: 13px; color: var(--sub); margin-bottom: 6px; letter-spacing: 0.1em; }
.lyric-line {
  font-size: 14px; color: rgba(255,105,180,0.8);
  margin-bottom: 20px; font-style: italic; letter-spacing: 0.05em;
}

.pills-row { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
.pill {
  padding: 4px 12px; border-radius: 20px;
  background: rgba(57,197,187,0.08);
  border: 1px solid rgba(57,197,187,0.25);
  font-size: 11px; font-weight: 600; color: var(--miku);
  letter-spacing: 0.06em; font-family: monospace;
}
.pill.pink { color: var(--pink); border-color: rgba(255,105,180,0.25); background: rgba(255,105,180,0.06); }

/* 频谱波形 */
.spectrum-wrap {
  width: 100%; height: 52px;
  display: flex; align-items: flex-end; gap: 2px;
  margin-bottom: 20px; padding: 0 2px;
  background: rgba(57,197,187,0.04); border-radius: 12px; overflow: hidden;
  border: 1px solid rgba(57,197,187,0.08);
}
.spec-bar {
  flex: 1; border-radius: 2px 2px 0 0; min-height: 3px;
  background: linear-gradient(to top, var(--miku), var(--pink));
  opacity: 0.6; transition: opacity 0.1s;
}
.spec-bar.active { opacity: 1; box-shadow: 0 0 6px var(--miku); }

/* 控件 */
.player-controls { display: flex; align-items: center; justify-content: center; gap: 18px; margin-bottom: 24px; }
.ctrl-btn {
  width: 46px; height: 46px; border-radius: 50%; border: 1px solid var(--border);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; background: rgba(57,197,187,0.08); color: var(--text);
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.ctrl-btn:active { transform: scale(0.88); }
.ctrl-btn.primary {
  width: 64px; height: 64px; font-size: 26px;
  background: linear-gradient(135deg, var(--miku), var(--pink));
  border: none; color: #fff;
  box-shadow: 0 8px 30px rgba(57,197,187,0.45);
}

.pull-hint {
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  color: var(--sub); font-size: 11px; letter-spacing: 0.1em;
  animation: hintBounce 2s ease-in-out infinite;
}
.pull-arrow { width: 22px; height: 22px; border-left: 1.5px solid var(--sub); border-bottom: 1.5px solid var(--sub); transform: rotate(-45deg) translateY(-3px); }
@keyframes hintBounce { 0%,100% { transform: translateY(0); opacity:0.5; } 50% { transform: translateY(6px); opacity:1; } }

/* ── 详情层 ── */
.detail-layer { position: relative; z-index: 1; padding-top: 100dvh; min-height: 200dvh; background: var(--bg); }
.detail-inner { padding: 40px 20px calc(var(--safe-bot)+60px); max-width: 480px; margin: 0 auto; }

.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 18px; padding: 20px; margin-bottom: 14px;
  backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
  opacity: 0; transform: translateY(20px);
  transition: opacity 0.5s ease, transform 0.5s ease;
  position: relative; overflow: hidden;
}
.card::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--miku), transparent);
}
.card.visible { opacity: 1; transform: translateY(0); }

.section-title {
  font-size: 11px; font-weight: 600; color: var(--miku);
  text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 14px;
  font-family: monospace;
}
.meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.meta-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.meta-icon { font-size: 16px; }
.meta-label { color: var(--sub); font-size: 11px; margin-top: 2px; font-family: monospace; }

.notes-waterfall { height: 110px; border-radius: 12px; background: rgba(57,197,187,0.04); overflow: hidden; border: 1px solid var(--border); }
.notes-canvas { width: 100%; height: 100%; }

.abc-output {
  background: rgba(10,30,35,0.9); border: 1px solid var(--border);
  border-radius: 14px; padding: 14px; overflow-x: auto;
}
.abc-output svg { max-width: 100%; filter: invert(1) hue-rotate(160deg) saturate(0.8); }

.share-section { text-align: center; padding: 24px 0 0; }
.share-btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 34px; border-radius: 50px;
  background: linear-gradient(135deg, var(--miku), var(--pink));
  color: #fff; font-size: 15px; font-weight: 600; border: none; cursor: pointer;
  box-shadow: 0 8px 28px rgba(57,197,187,0.4);
  transition: transform 0.15s; -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.04em;
}
.share-btn:active { transform: scale(0.95); }
.brand-tag { margin-top: 14px; font-size: 11px; color: var(--sub); letter-spacing: 0.08em; font-family: monospace; }

.back-btn {
  position: fixed; bottom: calc(var(--safe-bot)+24px); right: 20px;
  z-index: 200; width: 44px; height: 44px; border-radius: 50%;
  background: var(--card); border: 1px solid var(--border);
  backdrop-filter: blur(var(--blur)); -webkit-backdrop-filter: blur(var(--blur));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; color: var(--miku);
  opacity: 0; transform: translateY(12px);
  transition: opacity 0.3s, transform 0.3s;
  -webkit-tap-highlight-color: transparent;
}
.back-btn.visible { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>

<div id="preloader">
  <div class="pre-logo">🎤</div>
  <div class="pre-bar-wrap"><div class="pre-bar" id="preBar"></div></div>
  <div class="pre-text">LOADING VOCALOID...</div>
</div>

<div class="page-wrapper">

  <div class="cover-layer" id="coverLayer">
    <div class="holo-ring"></div>
    <div class="holo-ring"></div>
    <div class="holo-ring"></div>
    <div class="cover-content">
      <div class="holo-avatar">
        <div class="holo-disc" id="coverDisc">🎵</div>
      </div>
      <div class="cover-title">坠落星空</div>
      <div class="cover-sub">EP-Agent</div>
      <div class="lyric-line">♪ 坠落星空，音符飞舞 ♪</div>
      <div class="pills-row">
        <span class="pill">ABC Notation</span>
        <span class="pill pink">♩=120</span>
        <span class="pill">C 大调 调</span>
        <span class="pill">5 音符</span>
      </div>
      <div class="spectrum-wrap" id="waveformWrap"></div>
      <div class="player-controls">
        <button class="ctrl-btn" id="btnRestart">⏮</button>
        <button class="ctrl-btn primary" id="btnPlay">▶</button>
        <button class="ctrl-btn" id="btnStop">⏹</button>
      </div>
      <div class="pull-hint"><div class="pull-arrow"></div><span>SCROLL DOWN</span></div>
    </div>
  </div>

  <div class="detail-layer">
    <div class="detail-inner">
      <div class="card" data-card>
        <div class="section-title">// TRACK INFO</div>
        <div class="meta-grid">
          <div class="meta-item"><span class="meta-icon">🎵</span>
            <div><div>坠落星空</div><div class="meta-label">TITLE</div></div></div>
          <div class="meta-item"><span class="meta-icon">🎹</span><div><div>EP-Agent</div><div class="meta-label">作曲</div></div></div>
          <div class="meta-item"><span class="meta-icon">🎼</span>
            <div><div>C 大调</div><div class="meta-label">KEY</div></div></div>
          <div class="meta-item"><span class="meta-icon">🥁</span>
            <div><div>120 BPM</div><div class="meta-label">TEMPO</div></div></div>
          <div class="meta-item"><span class="meta-icon">🎹</span>
            <div><div>5</div><div class="meta-label">NOTES</div></div></div>
          <div class="meta-item"><span class="meta-icon">⏱</span>
            <div><div>0:02</div><div class="meta-label">LENGTH</div></div></div>
        </div>
        
      </div>

      <div class="card" data-card>
        <div class="section-title">// VISUALIZER</div>
        <div class="notes-waterfall"><canvas class="notes-canvas" id="notesCanvas"></canvas></div>
      </div>

      <div class="abc-section card" data-card><h3 class="section-title">🎼 乐谱</h3><div id="abcContainer" style="filter:invert(1) brightness(0.9);margin-top:12px;overflow-x:auto;"></div></div>
      

      <div class="share-section">
        <button class="share-btn" id="shareBtn"><span>📤</span><span>分享这首曲子</span></button>
        <div class="brand-tag">// POWERED BY EP-AGENT × MIKU</div>
      </div>
    </div>
  </div>
</div>

<button class="back-btn" id="backBtn">↑</button>

<script>
(function() {
  'use strict';
  const NOTES       = [{"pitch": "E4", "time_ms": 0, "duration_ms": 400}, {"pitch": "G4", "time_ms": 400, "duration_ms": 400}, {"pitch": "A4", "time_ms": 800, "duration_ms": 600}, {"pitch": "C5", "time_ms": 1400, "duration_ms": 800}, {"pitch": "B4", "time_ms": 2200, "duration_ms": 400}];
  const WAVEFORM    = [1.0, 0.05, 0.05, 0.05, 0.05, 0.05, 1.0, 0.05, 0.05, 0.05, 0.05, 0.05, 1.0, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 1.0, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 1.0, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05];
  const ABC_CONTENT = X:1\nT:\u5760\u843d\u661f\u7a7a\nM:4/4\nK:C\nEGAc B2|;
  const BPM         = 120;
  const DURATION_MS = 2600;
  const ACCENT      = '#39C5BB';
  const PINK        = '#FF69B4';

  // 预加载
  const preloader = document.getElementById('preloader');
  const preBar    = document.getElementById('preBar');
  let prog = 0;
  const t = setInterval(function() {
    prog += Math.random() * 15 + 5;
    if (prog >= 95) { clearInterval(t); prog = 95; }
    preBar.style.width = prog + '%';
  }, 90);
  window.addEventListener('load', function() {
    clearInterval(t); preBar.style.width = '100%';
    setTimeout(function() {
      preloader.classList.add('hide');
      setTimeout(function() {
        preloader.style.display = 'none';
        document.getElementById('coverLayer').classList.add('visible');
        document.querySelectorAll('[data-card]').forEach(function(c, i) {
          setTimeout(function() { c.classList.add('visible'); }, i * 100);
        });
      }, 900);
    }, 400);
  });

  // 波形
  const waveWrap = document.getElementById('waveformWrap');
  WAVEFORM.forEach(function(h) {
    const bar = document.createElement('div');
    bar.className = 'spec-bar';
    bar.style.height = Math.max(4, Math.round(h * 48)) + 'px';
    waveWrap.appendChild(bar);
  });

  // 播放器
  let audioCtx = null, isPlaying = false, playStart = 0;
  let scheduledNodes = [], animFrame = null;
  function getCtx() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }
  function stopAll() {
    scheduledNodes.forEach(function(n) { try { n.stop(0); } catch(e) {} });
    scheduledNodes = []; if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    isPlaying = false;
    document.getElementById('btnPlay').textContent = '▶';
    document.getElementById('coverDisc').classList.remove('playing');
    waveWrap.querySelectorAll('.spec-bar').forEach(function(b) { b.classList.remove('active'); });
  }
  function playNotes(offset) {
    const ctx = getCtx();
    if (ctx.state === 'suspended') ctx.resume();
    stopAll();
    const now = ctx.currentTime;
    playStart = now - offset / 1000;
    isPlaying = true;
    document.getElementById('btnPlay').textContent = '⏸';
    document.getElementById('coverDisc').classList.add('playing');
    NOTES.forEach(function(note) {
      const t2 = note.time_ms/1000, d = (note.duration_ms||200)/1000;
      if (t2 < offset/1000) return;
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      const freq = note.midi ? 440*Math.pow(2,(note.midi-69)/12) : 440;
      osc.type = 'triangle'; // 更像合成器音色
      osc.frequency.setValueAtTime(freq, now+t2);
      const st = now+t2;
      gain.gain.setValueAtTime(0, st);
      gain.gain.linearRampToValueAtTime(0.14, st+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, st+d);
      osc.start(st); osc.stop(st+d+0.05);
      scheduledNodes.push(osc);
    });
    setTimeout(function() { if(isPlaying) stopAll(); }, Math.max(1000, DURATION_MS-offset+500));
    (function animate() {
      if (!isPlaying) return;
      const elapsed = (getCtx().currentTime - playStart)*1000;
      const idx = Math.floor(Math.min(elapsed/(DURATION_MS||1),1)*waveWrap.children.length);
      waveWrap.querySelectorAll('.spec-bar').forEach(function(b,i) { b.classList.toggle('active', i===idx); });
      animFrame = requestAnimationFrame(animate);
    })();
  }
  document.getElementById('btnPlay').addEventListener('click', function() { if(isPlaying) stopAll(); else playNotes(0); });
  document.getElementById('btnStop').addEventListener('click', stopAll);
  document.getElementById('btnRestart').addEventListener('click', function() { stopAll(); setTimeout(function(){playNotes(0);},50); });

  // 音符瀑布
  function drawNotes() {
    const canvas = document.getElementById('notesCanvas');
    if (!canvas || !NOTES.length) return;
    const ctx2 = canvas.getContext('2d');
    const W = canvas.offsetWidth||300, H = canvas.offsetHeight||110;
    canvas.width = W*devicePixelRatio; canvas.height = H*devicePixelRatio;
    ctx2.scale(devicePixelRatio, devicePixelRatio);
    const maxT = NOTES.reduce(function(m,n){return Math.max(m,n.time_ms+(n.duration_ms||200));},1);
    const pitches = [...new Set(NOTES.map(function(n){return n.midi||n.pitch;}))].sort();
    const pitchIdx = {}; pitches.forEach(function(p,i){pitchIdx[p]=i;});
    const rows = Math.max(pitches.length,1);
    ctx2.clearRect(0,0,W,H);
    NOTES.forEach(function(note) {
      const x = (note.time_ms/maxT)*W;
      const pw = Math.max(2,((note.duration_ms||200)/maxT)*W);
      const pi = pitchIdx[note.midi||note.pitch]||0;
      const y = H-((pi/rows)*H)-4;
      const grad = ctx2.createLinearGradient(x,y,x+pw,y);
      grad.addColorStop(0, ACCENT); grad.addColorStop(1, PINK);
      ctx2.fillStyle = grad; ctx2.globalAlpha = 0.8;
      ctx2.beginPath();
      if (ctx2.roundRect) ctx2.roundRect(x,y,pw,4,2); else ctx2.rect(x,y,pw,4);
      ctx2.fill();
    });
    ctx2.globalAlpha = 1;
  }

  function renderAbc() {
    if (!ABC_CONTENT || !window.ABCJS) return;
    try { ABCJS.renderAbc('abcOutput', ABC_CONTENT, {responsive:'resize'}); } catch(e) {}
  }

  // 下拉
  const coverLayer = document.getElementById('coverLayer');
  const backBtn = document.getElementById('backBtn');
  let coverPulled = false, touchStartY = 0;
  document.addEventListener('touchstart', function(e){touchStartY=e.touches[0].clientY;},{passive:true});
  document.addEventListener('touchmove', function(e){
    if(!coverPulled && e.touches[0].clientY-touchStartY<-60 && window.scrollY<10) pullCover();
  },{passive:true});
  document.addEventListener('wheel', function(e){if(!coverPulled&&e.deltaY>80) pullCover();},{passive:true});
  function pullCover(){
    if(coverPulled) return; coverPulled=true;
    coverLayer.classList.add('pulled');
    setTimeout(function(){window.scrollTo({top:window.innerHeight*0.5,behavior:'smooth'});},200);
    backBtn.classList.add('visible');
  }
  backBtn.addEventListener('click',function(){
    coverPulled=false; coverLayer.classList.remove('pulled');
    window.scrollTo({top:0,behavior:'smooth'}); backBtn.classList.remove('visible');
  });
  window.addEventListener('scroll',function(){
    if(window.scrollY>window.innerHeight*0.3){
      if(!coverPulled){coverPulled=true;coverLayer.classList.add('pulled');}
      backBtn.classList.add('visible');
    } else { backBtn.classList.remove('visible'); }
  },{passive:true});

  // 分享
  document.getElementById('shareBtn').addEventListener('click',function(){
    if(navigator.share) navigator.share({title:'坠落星空',url:location.href}).catch(function(){});
    else navigator.clipboard.writeText(location.href).then(function(){
      document.querySelector('.share-btn span:last-child').textContent='链接已复制！';
      setTimeout(function(){document.querySelector('.share-btn span:last-child').textContent='分享这首曲子';},2000);
    }).catch(function(){});
  });

  // IntersectionObserver
  if('IntersectionObserver' in window){
    const obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
    },{threshold:0.15});
    document.querySelectorAll('[data-card]').forEach(function(el){obs.observe(el);});
  }

  window.addEventListener('load', function(){drawNotes();renderAbc();});
  window.addEventListener('resize', drawNotes);
})();
</script>
</body>
</html>
