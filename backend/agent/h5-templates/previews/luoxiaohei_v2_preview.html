  风格：深夜森林 + 月光 + 猫咪立绘 + 萤火虫粒子 + 温柔动效
  额外变量：

    🌙 深夜的温柔时光   — 夜晚氛围描述
    3100  — 时长毫秒
    <div class="cover-sub">EP-Agent</div> <div class="meta-item"><div class="meta-icon-wrap">🎹</div><div><div class="meta-val">EP-Agent</div><div class="meta-label">作曲</div></div></div> <span class="pill">5 音符</span> <span class="pill sub">0:03</span>
     <div class="card" data-card><div class="section-title">乐谱</div><div class="abc-output"><div id="abcContainer"></div></div></div>  
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D0B1A">
<title>晚安喵 — 罗小黑 × EP-Agent</title>
<meta property="og:title" content="晚安喵">
<meta property="og:description" content="5 音符 · 0:03 · ABC Notation">
<script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.4.4/abcjs-basic-min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --night:   #0D0B1A;
  --deep:    #1A1530;
  --purple:  #7C5CBF;
  --purple2: #9B6FD4;
  --moon:    #E8D5A3;
  --orange:  #F5A623;
  --text:    #EDE8F5;
  --sub:     rgba(200,180,230,0.58);
  --card:    rgba(20,16,36,0.92);
  --border:  rgba(124,92,191,0.22);
  --glow:    rgba(124,92,191,0.40);
  --blur:    22px;
  --safe-top: env(safe-area-inset-top,0px);
  --safe-bot: env(safe-area-inset-bottom,0px);
}

html,body{
  width:100%;height:100%;
  background:var(--night);color:var(--text);
  font-family:-apple-system,"PingFang SC","Helvetica Neue",sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}

/* ── 星空 Canvas ── */
#starCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;width:100%;height:100%;}

/* ── 预加载 ── */
#preloader{
  position:fixed;inset:0;z-index:9999;
  background:var(--night);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:18px;
  transition:opacity 1s cubic-bezier(0.4,0,0.2,1);
}
#preloader.hide{opacity:0;pointer-events:none}

.pre-scene{position:relative;width:120px;height:120px;display:flex;align-items:center;justify-content:center;}
.pre-cat-img{
  width:88px;height:88px;object-fit:contain;
  filter:drop-shadow(0 0 16px rgba(124,92,191,0.7)) drop-shadow(0 0 32px rgba(245,166,35,0.3));
  animation:catFloat 2.8s ease-in-out infinite;
}
@keyframes catFloat{
  0%,100%{transform:translateY(0) rotate(-2deg);}
  50%{transform:translateY(-10px) rotate(2deg);}
}
.pre-moon-deco{
  position:absolute;top:0;right:0;font-size:28px;
  animation:moonGlow 3s ease-in-out infinite;
}
@keyframes moonGlow{
  0%,100%{filter:drop-shadow(0 0 6px rgba(232,213,163,0.5));}
  50%{filter:drop-shadow(0 0 18px rgba(232,213,163,0.9));}
}
.pre-ring{
  position:absolute;inset:-12px;border-radius:50%;
  border:1px solid rgba(124,92,191,0.3);
  animation:ringPulse 2.5s ease-in-out infinite;
}
.pre-ring:nth-child(3){inset:-24px;border-color:rgba(245,166,35,0.15);animation-delay:0.8s;}
@keyframes ringPulse{
  0%,100%{opacity:0.7;transform:scale(1);}
  50%{opacity:0.2;transform:scale(1.06);}
}
.pre-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:0.02em;}
.pre-sub{font-size:12px;color:var(--sub);letter-spacing:0.10em;}
.pre-bar-wrap{width:160px;height:2px;background:rgba(124,92,191,0.15);border-radius:2px;overflow:hidden;}
.pre-bar{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--purple),var(--orange));
  border-radius:2px;transition:width 0.06s linear;position:relative;
}
.pre-bar::after{
  content:"";position:absolute;right:0;top:-3px;
  width:14px;height:8px;border-radius:4px;
  background:color-mix(in srgb,var(--orange) 70%,#fff);filter:blur(4px);
}

/* ── 封面层 ── */
.cover-layer{
  position:fixed;inset:0;height:100dvh;z-index:100;
  display:flex;flex-direction:column;
  align-items:center;justify-content:flex-end;
  padding:calc(var(--safe-top)+16px) 22px calc(var(--safe-bot)+36px);
  transition:transform 0.65s cubic-bezier(0.32,0.72,0,1),opacity 0.65s ease;
  will-change:transform,opacity;overflow:hidden;opacity:0;
  background:
    radial-gradient(ellipse 55% 45% at 65% 15%, rgba(124,92,191,0.18) 0%, transparent 65%),
    radial-gradient(ellipse 40% 35% at 25% 75%, rgba(245,166,35,0.10) 0%, transparent 55%),
    radial-gradient(ellipse 30% 50% at 80% 70%, rgba(155,107,212,0.08) 0%, transparent 50%),
    linear-gradient(180deg,#0D0B1A 0%,#1A1530 100%);
}
.cover-layer.visible{opacity:1}
.cover-layer.pulled{transform:translateY(-100%);opacity:0;pointer-events:none}

/* 森林装饰图（左下角） */
.deco-forest{
  position:absolute;bottom:0;left:-10px;
  width:min(220px,55vw);height:auto;object-fit:contain;
  opacity:0.28;pointer-events:none;
  filter:hue-rotate(0deg) saturate(1.2);
  animation:decoSway 9s ease-in-out infinite;
  transform-origin:bottom left;
}
@keyframes decoSway{
  0%,100%{transform:rotate(0deg);}
  50%{transform:rotate(1.5deg);}
}

/* 猫爪星星（右上角散点） */
.deco-paw{
  position:absolute;top:6%;right:4%;
  width:min(140px,36vw);height:auto;object-fit:contain;
  opacity:0.20;pointer-events:none;
  animation:pawFloat 7s ease-in-out infinite;
}
@keyframes pawFloat{
  0%,100%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-8px) rotate(4deg);}
}

/* 月亮 emoji（右上） */
.deco-moon{
  position:absolute;top:10%;right:22%;
  font-size:48px;
  filter:drop-shadow(0 0 18px rgba(232,213,163,0.55));
  animation:moonFloat 6s ease-in-out infinite;
}
@keyframes moonFloat{
  0%,100%{transform:translateY(0) rotate(-4deg);}
  50%{transform:translateY(-7px) rotate(4deg);}
}

/* 猫咪立绘（封面主角） */
.cat-char{
  position:absolute;
  bottom:0;left:50%;transform:translateX(-50%);
  width:min(300px,70vw);height:auto;
  object-fit:contain;object-position:bottom;
  pointer-events:none;z-index:1;
  filter:
    drop-shadow(0 0 24px rgba(124,92,191,0.6))
    drop-shadow(0 0 60px rgba(124,92,191,0.25))
    drop-shadow(0 -4px 20px rgba(245,166,35,0.20));
  animation:charFloat 4.5s ease-in-out infinite;
  mask-image:linear-gradient(to top,transparent 0%,black 15%,black 88%,transparent 100%);
  -webkit-mask-image:linear-gradient(to top,transparent 0%,black 15%,black 88%,transparent 100%);
}
@keyframes charFloat{
  0%,100%{transform:translateX(-50%) translateY(0);}
  50%{transform:translateX(-50%) translateY(-9px);}
}

/* 封面内容 */
.cover-content{position:relative;z-index:3;width:100%;max-width:400px;text-align:center;}

/* 渐变标题 */
.cover-title{
  font-size:clamp(22px,6vw,34px);font-weight:800;
  letter-spacing:-0.02em;line-height:1.15;margin-bottom:7px;
  background:linear-gradient(135deg,var(--text) 25%,var(--moon) 55%,var(--orange));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 18px rgba(232,213,163,0.3));
}
.cover-sub{font-size:13px;color:var(--sub);margin-bottom:5px;letter-spacing:0.04em;}
.night-mood{
  font-size:13px;color:rgba(245,166,35,0.75);
  margin-bottom:16px;font-style:italic;letter-spacing:0.04em;
  text-shadow:0 0 10px rgba(245,166,35,0.4);
}

/* 胶囊 */
.pills-row{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:18px;}
.pill{
  padding:5px 13px;border-radius:50px;
  background:rgba(124,92,191,0.10);border:1px solid var(--border);
  font-size:11px;font-weight:600;color:rgba(200,180,240,0.9);
  letter-spacing:0.04em;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.pill.warm{color:var(--orange);border-color:rgba(245,166,35,0.28);background:rgba(245,166,35,0.08);}
.pill.sub{color:var(--sub);font-weight:500;}

/* 波形 */
.waveform-wrap{
  width:100%;height:52px;
  display:flex;align-items:flex-end;gap:2px;
  margin-bottom:16px;padding:6px 8px 0;
  background:rgba(124,92,191,0.05);
  border:1px solid rgba(124,92,191,0.10);
  border-radius:14px;overflow:hidden;
}
.wave-bar{
  flex:1;border-radius:3px 3px 0 0;min-height:3px;opacity:0.45;
  background:linear-gradient(to top,var(--purple),var(--moon));
  transition:opacity 0.08s,transform 0.08s;transform-origin:bottom;
}
.wave-bar.active{opacity:1;transform:scaleY(1.15);filter:drop-shadow(0 0 4px rgba(124,92,191,0.7));}

/* 进度条 */
.progress-wrap{
  width:100%;height:2px;background:rgba(124,92,191,0.12);
  border-radius:2px;margin-bottom:8px;cursor:pointer;
}
.progress-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--purple),var(--orange));
  border-radius:2px;transition:width 0.1s linear;
}
.progress-time{
  display:flex;justify-content:space-between;
  font-size:10px;color:var(--sub);margin-bottom:16px;letter-spacing:0.04em;
}

/* 控件 */
.player-controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:20px;}
.ctrl-btn{
  width:48px;height:48px;border-radius:50%;
  border:1px solid var(--border);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:19px;background:rgba(124,92,191,0.09);color:var(--text);
  transition:transform 0.12s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s;
  -webkit-tap-highlight-color:transparent;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
}
.ctrl-btn:active{transform:scale(0.84);}
.ctrl-btn.primary{
  width:70px;height:70px;font-size:27px;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  border:none;color:#fff;
  box-shadow:0 10px 32px rgba(124,92,191,0.50);
  animation:btnGlow 3.5s ease-in-out infinite;
}
@keyframes btnGlow{
  0%,100%{box-shadow:0 10px 32px rgba(124,92,191,0.50);}
  50%{box-shadow:0 14px 44px rgba(124,92,191,0.70),0 0 28px rgba(245,166,35,0.25);}
}

/* 下拉提示 */
.pull-hint{
  display:flex;flex-direction:column;align-items:center;gap:7px;
  color:var(--sub);font-size:11px;letter-spacing:0.08em;
  animation:hintFloat 2.8s ease-in-out infinite;
}
.pull-chevron{display:flex;flex-direction:column;gap:3px;align-items:center;}
.pull-chevron span{
  display:block;width:20px;height:1.5px;
  background:var(--sub);border-radius:2px;
}
.pull-chevron span:first-child{transform:rotate(30deg) translateX(4px);}
.pull-chevron span:last-child{transform:rotate(-30deg) translateX(-4px);}
@keyframes hintFloat{
  0%,100%{transform:translateY(0);opacity:0.45;}
  50%{transform:translateY(7px);opacity:0.9;}
}

/* ── 详情层 ── */
.detail-layer{position:relative;z-index:1;padding-top:100dvh;min-height:200dvh;background:var(--night);}
.detail-inner{padding:40px 18px calc(var(--safe-bot)+64px);max-width:480px;margin:0 auto;}

/* 卡片 */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:22px;padding:20px 18px;margin-bottom:14px;
  backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
  opacity:0;transform:translateY(26px) scale(0.98);
  transition:opacity 0.55s cubic-bezier(0.4,0,0.2,1),transform 0.55s cubic-bezier(0.4,0,0.2,1);
  position:relative;overflow:hidden;
}
/* 顶部月光渐变线 */
.card::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--purple) 35%,var(--moon) 50%,var(--orange) 65%,transparent);
  opacity:0.55;
}
/* 猫爪水印 */
.card::after{
  content:"🐾";position:absolute;bottom:10px;right:14px;
  font-size:18px;opacity:0.08;
}
.card.visible{opacity:1;transform:translateY(0) scale(1);}

.section-title{
  font-size:11px;font-weight:700;color:var(--purple2);
  text-transform:uppercase;letter-spacing:0.12em;margin-bottom:14px;
  display:flex;align-items:center;gap:8px;
}
.section-title::before{content:"🌙";font-size:13px;}
.section-title::after{content:"";flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent);}

/* 元数据 */
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.meta-item{display:flex;align-items:center;gap:10px;}
.meta-icon-wrap{
  width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:rgba(124,92,191,0.10);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:15px;
}
.meta-val{font-size:13px;font-weight:600;line-height:1.3;}
.meta-label{color:var(--sub);font-size:10px;margin-top:2px;letter-spacing:0.04em;}

/* 音符瀑布 */
.notes-waterfall{height:120px;border-radius:14px;background:rgba(124,92,191,0.04);overflow:hidden;border:1px solid var(--border);}
.notes-canvas{width:100%;height:100%;}

/* ABC */
.abc-output{background:rgba(13,11,26,0.95);border:1px solid var(--border);border-radius:14px;padding:14px;overflow-x:auto;margin-top:12px;}
.abc-output svg{max-width:100%;filter:invert(1) sepia(0.3) brightness(0.85);}

/* 视频 */
.video-wrap{border-radius:16px;overflow:hidden;background:#000;aspect-ratio:16/9;margin-top:12px;}
.video-wrap video{width:100%;height:100%;object-fit:cover;}

/* 分享 */
.share-section{text-align:center;padding:28px 0 0;}
.share-btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:15px 38px;border-radius:50px;
  background:linear-gradient(135deg,var(--purple),var(--purple2));
  color:#fff;font-size:15px;font-weight:600;border:none;cursor:pointer;
  box-shadow:0 10px 32px rgba(124,92,191,0.45);
  transition:transform 0.15s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.share-btn:active{transform:scale(0.93);}
.brand-tag{margin-top:14px;font-size:11px;color:var(--sub);letter-spacing:0.06em;}

/* 返回按钮 */
.back-btn{
  position:fixed;bottom:calc(var(--safe-bot)+28px);right:20px;
  z-index:200;width:48px;height:48px;border-radius:50%;
  background:var(--card);border:1px solid var(--border);
  backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
  display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;color:var(--moon);
  opacity:0;transform:translateY(16px) scale(0.85);
  transition:opacity 0.3s,transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 6px 20px rgba(0,0,0,0.5);
}
.back-btn.visible{opacity:1;transform:translateY(0) scale(1);}
</style>
</head>

            <div class="meta-icon-wrap">🎼</div>
            <div><div class="meta-val">C 大调</div><div class="meta-label">调号</div></div>
          </div>
          <div class="meta-item">
            <div class="meta-icon-wrap">🥁</div>
            <div><div class="meta-val">96 BPM</div><div class="meta-label">速度</div></div>
          </div>
          <div class="meta-item">
            <div class="meta-icon-wrap">🎹</div>
            <div><div class="meta-val">5</div><div class="meta-label">音符数</div></div>
          </div>
          <div class="meta-item">
            <div class="meta-icon-wrap">⏱</div>
            <div><div class="meta-val">0:03</div><div class="meta-label">时长</div></div>
          </div>
        </div>
        
      </div>

      <div class="card" data-card>
        <div class="section-title">音符可视化</div>
        <div class="notes-waterfall"><canvas class="notes-canvas" id="notesCanvas"></canvas></div>
      </div>

      <div class="card" data-card><div class="section-title">乐谱</div><div class="abc-output"><div id="abcContainer"></div></div></div>
      

      <div class="share-section">
        <button class="share-btn" id="shareBtn"><span>🌙</span><span>分享给朋友</span></button>
        <div class="brand-tag">由 EP-Agent 生成 · 罗小黑主题</div>
      </div>
    </div>
  </div>
</div>

<button class="back-btn" id="backBtn" aria-label="返回封面">🌙</button>

<script>
(function(){
  'use strict';

  const NOTES       = [{"pitch": "E4", "midi": 64, "time_ms": 0, "duration_ms": 500}, {"pitch": "G4", "midi": 67, "time_ms": 500, "duration_ms": 500}, {"pitch": "A4", "midi": 69, "time_ms": 1000, "duration_ms": 700}, {"pitch": "C5", "midi": 72, "time_ms": 1700, "duration_ms": 900}, {"pitch": "B4", "midi": 71, "time_ms": 2600, "duration_ms": 500}];
  const WAVEFORM    = [1.0, 0.25, 0.05, 0.05, 0.05, 0.25, 0.5, 0.25, 0.05, 0.05, 0.05, 0.25, 0.5, 0.25, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.25, 0.5, 0.25, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.05, 0.25, 0.5, 0.25, 0.05, 0.05, 0.05, 0.05, 0.05];
  const ABC_CONTENT = "X:1\nT:\u665a\u5b89\u55b5\nM:4/4\nK:C\n|:E2GA c2BA|G4E2D2:|";
  const BPM         = 96;
  const DURATION_MS = 3100;
  const PURPLE      = '#7C5CBF';
  const ORANGE      = '#F5A623';
  const MOON        = '#E8D5A3';

  /* ── 星空 Canvas ── */
  (function initStars(){
    const canvas = document.getElementById('starCanvas');
    if(!canvas) return;
    const ctx = canvas.getContext('2d');
    let W = window.innerWidth, H = window.innerHeight;
    canvas.width = W; canvas.height = H;
    // 星星 + 萤火虫
    const stars = Array.from({length:100}, function(){
      return {x:Math.random()*W, y:Math.random()*H,
              r:Math.random()*1.4+0.2, o:Math.random()*0.5+0.15,
              type:'star'};
    });
    const fireflies = Array.from({length:18}, function(){
      return {x:Math.random()*W, y:Math.random()*H,
              r:Math.random()*2+1,
              vx:(Math.random()-0.5)*0.6, vy:(Math.random()-0.5)*0.6,
              o:Math.random()*0.6+0.2, type:'fly'};
    });
    let frame = 0;
    function draw(){
      ctx.clearRect(0,0,W,H);
      frame++;
      stars.forEach(function(s,i){
        const tw = Math.sin(frame*0.018+i)*0.3+0.7;
        ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
        ctx.fillStyle = MOON; ctx.globalAlpha = s.o*tw; ctx.fill();
      });
      fireflies.forEach(function(f){
        f.x += f.vx; f.y += f.vy;
        if(f.x<0) f.x=W; if(f.x>W) f.x=0;
        if(f.y<0) f.y=H; if(f.y>H) f.y=0;
        const tw = Math.sin(frame*0.04+f.x)*0.4+0.6;
        ctx.beginPath(); ctx.arc(f.x,f.y,f.r,0,Math.PI*2);
        ctx.fillStyle = ORANGE; ctx.globalAlpha = f.o*tw*0.55; ctx.fill();
        // 光晕
        const g = ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*4);
        g.addColorStop(0,'rgba(245,166,35,0.25)'); g.addColorStop(1,'transparent');
        ctx.fillStyle = g; ctx.globalAlpha = f.o*tw*0.3;
        ctx.beginPath(); ctx.arc(f.x,f.y,f.r*4,0,Math.PI*2); ctx.fill();
      });
      ctx.globalAlpha = 1;
      requestAnimationFrame(draw);
    }
    draw();
    window.addEventListener('resize',function(){
      W=window.innerWidth; H=window.innerHeight;
      canvas.width=W; canvas.height=H;
    });
  })();

  /* ── 预加载 ── */
  const preloader = document.getElementById('preloader');
  const preBar    = document.getElementById('preBar');
  let pct = 0;
  const lt = setInterval(function(){
    pct += Math.random()*12+4;
    if(pct>=92){clearInterval(lt);pct=92;}
    preBar.style.width = pct+'%';
  }, 90);

  window.addEventListener('load',function(){
    clearInterval(lt); preBar.style.width='100%';
    setTimeout(function(){
      preloader.classList.add('hide');
      setTimeout(function(){
        preloader.style.display='none';
        document.getElementById('coverLayer').classList.add('visible');
        document.querySelectorAll('[data-card]').forEach(function(c,i){
          setTimeout(function(){c.classList.add('visible');},i*130);
        });
      },1000);
    },380);
  });

  /* ── 波形 ── */
  const waveWrap = document.getElementById('waveformWrap');
  WAVEFORM.forEach(function(h){
    const bar = document.createElement('div');
    bar.className = 'wave-bar';
    bar.style.height = Math.max(4,Math.round(h*46))+'px';
    waveWrap.appendChild(bar);
  });

  /* ── Web Audio ── */
  let audioCtx=null, isPlaying=false, playStart=0;
  let scheduledNodes=[], animFrame=null;

  function getCtx(){
    if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    return audioCtx;
  }
  function fmtTime(ms){
    const s=Math.floor(ms/1000);
    return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  }
  function stopAll(){
    scheduledNodes.forEach(function(n){try{n.stop(0);}catch(e){}});
    scheduledNodes=[];
    if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
    isPlaying=false;
    document.getElementById('btnPlay').textContent='▶';
    waveWrap.querySelectorAll('.wave-bar').forEach(function(b){b.classList.remove('active');});
    setProgress(0);
  }
  function setProgress(p){
    document.getElementById('progressFill').style.width=(p*100)+'%';
    document.getElementById('timeElapsed').textContent=fmtTime(p*DURATION_MS);
  }
  function playNotes(offsetMs){
    const ctx=getCtx();
    if(ctx.state==='suspended') ctx.resume();
    stopAll();
    const now=ctx.currentTime;
    playStart=now-offsetMs/1000;
    isPlaying=true;
    document.getElementById('btnPlay').textContent='⏸';

    NOTES.forEach(function(note){
      const t=note.time_ms/1000, d=(note.duration_ms||200)/1000;
      if(t<offsetMs/1000) return;
      const osc=ctx.createOscillator(), gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      const freq=note.midi?440*Math.pow(2,(note.midi-69)/12):440;
      osc.type='sine';
      osc.frequency.setValueAtTime(freq,now+t);
      const st=now+t;
      gain.gain.setValueAtTime(0,st);
      gain.gain.linearRampToValueAtTime(0.13,st+0.015);
      gain.gain.exponentialRampToValueAtTime(0.001,st+d);
      osc.start(st); osc.stop(st+d+0.06);
      scheduledNodes.push(osc);
    });

    setTimeout(function(){if(isPlaying)stopAll();},Math.max(1000,DURATION_MS-offsetMs+600));

    (function tick(){
      if(!isPlaying) return;
      const elapsed=(getCtx().currentTime-playStart)*1000;
      const p=Math.min(elapsed/(DURATION_MS||1),1);
      setProgress(p);
      const idx=Math.floor(p*waveWrap.children.length);
      waveWrap.querySelectorAll('.wave-bar').forEach(function(b,i){b.classList.toggle('active',i===idx);});
      animFrame=requestAnimationFrame(tick);
    })();
  }

  document.getElementById('progressWrap').addEventListener('click',function(e){
    if(!DURATION_MS) return;
    const r=this.getBoundingClientRect();
    const p=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
    if(isPlaying) playNotes(p*DURATION_MS); else setProgress(p);
  });
  document.getElementById('btnPlay').addEventListener('click',function(){if(isPlaying)stopAll();else playNotes(0);});
  document.getElementById('btnStop').addEventListener('click',stopAll);
  document.getElementById('btnRestart').addEventListener('click',function(){stopAll();setTimeout(function(){playNotes(0);},60);});

  /* ── 音符瀑布 ── */
  function drawNotes(){
    const canvas=document.getElementById('notesCanvas');
    if(!canvas||!NOTES.length) return;
    const ctx2=canvas.getContext('2d');
    const W=canvas.offsetWidth||320, H=canvas.offsetHeight||120;
    canvas.width=W*devicePixelRatio; canvas.height=H*devicePixelRatio;
    ctx2.scale(devicePixelRatio,devicePixelRatio);
    const maxT=NOTES.reduce(function(m,n){return Math.max(m,n.time_ms+(n.duration_ms||200));},1);
    const pitches=[...new Set(NOTES.map(function(n){return n.midi||n.pitch;}))].sort();
    const rows=Math.max(pitches.length,1);
    const pitchIdx={};
    pitches.forEach(function(p,i){pitchIdx[p]=i;});
    ctx2.clearRect(0,0,W,H);
    NOTES.forEach(function(note){
      const x=(note.time_ms/maxT)*W;
      const pw=Math.max(3,((note.duration_ms||200)/maxT)*W);
      const pi=pitchIdx[note.midi||note.pitch]||0;
      const y=H-((pi/rows)*(H-8))-5;
      const grad=ctx2.createLinearGradient(x,y,x+pw,y);
      grad.addColorStop(0,PURPLE); grad.addColorStop(1,MOON);
      ctx2.fillStyle=grad; ctx2.globalAlpha=0.78;
      ctx2.beginPath();
      if(ctx2.roundRect) ctx2.roundRect(x,y,pw,5,2.5);
      else ctx2.rect(x,y,pw,5);
      ctx2.fill();
    });
    ctx2.globalAlpha=1;
  }

  /* ── ABC 渲染 ── */
  function renderAbc(){
    const container=document.getElementById('abcContainer');
    if(!container||!ABC_CONTENT||!window.ABCJS) return;
    try{ABCJS.renderAbc('abcContainer',ABC_CONTENT,{responsive:'resize'});}catch(e){}
  }

  /* ── 下拉手势 ── */
  const coverLayer=document.getElementById('coverLayer');
  const backBtn=document.getElementById('backBtn');
  let coverPulled=false, touchStartY=0;

  document.addEventListener('touchstart',function(e){touchStartY=e.touches[0].clientY;},{passive:true});
  document.addEventListener('touchmove',function(e){
    if(!coverPulled&&e.touches[0].clientY-touchStartY<-55&&window.scrollY<10) pullCover();
  },{passive:true});
  document.addEventListener('wheel',function(e){if(!coverPulled&&e.deltaY>60)pullCover();},{passive:true});

  function pullCover(){
    if(coverPulled) return; coverPulled=true;
    coverLayer.classList.add('pulled');
    setTimeout(function(){window.scrollTo({top:window.innerHeight*0.4,behavior:'smooth'});},200);
    backBtn.classList.add('visible');
  }
  backBtn.addEventListener('click',function(){
    coverPulled=false; coverLayer.classList.remove('pulled');
    window.scrollTo({top:0,behavior:'smooth'}); backBtn.classList.remove('visible');
  });
  window.addEventListener('scroll',function(){
    if(window.scrollY>window.innerHeight*0.25){
      if(!coverPulled){coverPulled=true;coverLayer.classList.add('pulled');}
      backBtn.classList.add('visible');
    } else { backBtn.classList.remove('visible'); }
  },{passive:true});

  /* ── 分享 ── */
  document.getElementById('shareBtn').addEventListener('click',function(){
    const label=document.querySelector('.share-btn span:last-child');
    if(navigator.share) navigator.share({title:'晚安喵',url:location.href}).catch(function(){});
    else navigator.clipboard.writeText(location.href).then(function(){
      label.textContent='✓ 链接已复制';
      setTimeout(function(){label.textContent='分享给朋友';},2200);
    }).catch(function(){});
  });

  /* ── IntersectionObserver ── */
  if('IntersectionObserver' in window){
    const obs=new IntersectionObserver(function(entries){
      entries.forEach(function(e){if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
    },{threshold:0.12});
    document.querySelectorAll('[data-card]').forEach(function(el){obs.observe(el);});
  }

  window.addEventListener('load',function(){drawNotes();renderAbc();});
  window.addEventListener('resize',drawNotes);
}());
</script>
</body>
</html>
