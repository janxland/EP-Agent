<!DOCTYPE html>
<html lang="zh-CN">
<!--
  EP-Agent H5 模板：初音未来（Miku）v3.0
  主题色：青绿 #39C5BB / 粉紫 #FF69B4
  变量：{{TITLE}} {{COMPOSER}} {{BPM}} {{KEY}} {{FORMAT_LABEL}}
        {{MIDI_URL}} {{ABC_CONTENT}} {{ABC_SECTION}} {{VIDEO_SECTION}}
        {{LYRIC_LINE}} {{EXTRA_HTML}} {{ABC_SVG_FILTER}} {{THEME}}
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050F12">
<title>{{TITLE}} — 初音未来 × EP-Agent</title>
<script src="https://cdn.jsdelivr.net/npm/midi-player-js@2.0.16/browser/midiplayer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.4.4/abcjs-basic-min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --miku:#39C5BB;--pink:#FF69B4;--purple:#9B59B6;
  --bg:#050F12;--bg2:#081820;--text:#E0FFFD;
  --sub:rgba(57,197,187,0.6);--card:rgba(8,24,32,0.92);
  --border:rgba(57,197,187,0.2);--glow:rgba(57,197,187,0.45);
  --glow-hi:rgba(57,197,187,0.7);--blur:22px;
  --safe-t:env(safe-area-inset-top,0px);--safe-b:env(safe-area-inset-bottom,0px);
}
/* 扫描线 */
body::before{
  content:"";position:fixed;inset:0;z-index:9990;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,
    rgba(57,197,187,0.022) 3px,rgba(57,197,187,0.022) 4px);
}
html{scroll-snap-type:y mandatory;overflow-y:scroll;height:100%}
body{background:var(--bg);color:var(--text);
  font-family:-apple-system,"PingFang SC",sans-serif;
  -webkit-font-smoothing:antialiased;overflow-x:hidden}

/* ── 预加载 ── */
#preloader{position:fixed;inset:0;z-index:9999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  transition:opacity .9s cubic-bezier(.4,0,.2,1)}
#preloader.out{opacity:0;pointer-events:none}
.pre-holo{width:96px;height:96px;border-radius:50%;position:relative;
  display:flex;align-items:center;justify-content:center}
.pre-holo-img{width:72px;height:72px;border-radius:50%;object-fit:cover;
  filter:drop-shadow(0 0 14px var(--miku)) drop-shadow(0 0 28px rgba(57,197,187,.5));
  animation:holoBob 2.5s ease-in-out infinite}
@keyframes holoBob{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-7px) scale(1.05)}}
.pre-holo::before,.pre-holo::after{content:"";position:absolute;border-radius:50%;
  border:1px solid rgba(57,197,187,.3);animation:ringPulse 2s ease-in-out infinite}
.pre-holo::before{inset:-10px}
.pre-holo::after{inset:-22px;border-color:rgba(255,105,180,.22);animation-delay:.6s}
@keyframes ringPulse{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:.15;transform:scale(1.08)}}
.pre-title{font-size:16px;font-weight:700;color:var(--text);letter-spacing:.04em}
.pre-track{width:180px;height:2px;background:rgba(57,197,187,.15);border-radius:2px;overflow:hidden}
.pre-fill{height:100%;width:0;background:linear-gradient(90deg,var(--miku),var(--pink));
  border-radius:2px;transition:width .06s linear}

/* ── 封面屏 ── */
.screen{scroll-snap-align:start;min-height:100dvh;position:relative;overflow:hidden}
#coverScreen{
  background:linear-gradient(160deg,#050F12 0%,#081820 40%,#050F12 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:calc(var(--safe-t)+20px) 28px calc(var(--safe-b)+28px);
}
/* 全息光晕背景 */
.holo-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden}
.holo-orb{position:absolute;border-radius:50%;filter:blur(70px);animation:orbDrift 9s ease-in-out infinite alternate}
.holo-orb-1{width:300px;height:300px;top:-80px;right:-60px;
  background:radial-gradient(circle,rgba(57,197,187,.18) 0%,transparent 70%)}
.holo-orb-2{width:220px;height:220px;bottom:-40px;left:-50px;
  background:radial-gradient(circle,rgba(255,105,180,.14) 0%,transparent 70%);animation-delay:-5s}
@keyframes orbDrift{from{transform:translate(0,0)}to{transform:translate(18px,28px)}}

/* 立绘 */
.char-wrap{position:relative;width:160px;height:200px;margin-bottom:8px;flex-shrink:0}
.char-img{
  width:100%;height:100%;object-fit:contain;
  filter:drop-shadow(0 0 20px var(--miku)) drop-shadow(0 0 40px rgba(57,197,187,.4));
  animation:charFloat 4s ease-in-out infinite;position:relative;z-index:2
}
@keyframes charFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.char-scan{
  position:absolute;inset:0;z-index:3;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 6px,
    rgba(57,197,187,.04) 6px,rgba(57,197,187,.04) 7px);
  animation:scanMove 3s linear infinite
}
@keyframes scanMove{from{background-position:0 0}to{background-position:0 -100px}}

/* 文字 */
.cover-text{text-align:center;width:100%;max-width:360px;position:relative;z-index:2}
.cover-title{
  font-size:clamp(24px,7vw,38px);font-weight:800;letter-spacing:-.03em;line-height:1.08;
  margin-bottom:6px;
  background:linear-gradient(135deg,var(--text) 20%,var(--miku) 60%,var(--pink));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.lyric-line{
  font-size:13px;color:var(--sub);margin-bottom:8px;letter-spacing:.06em;
  font-style:italic;min-height:18px;
}
.cover-composer{font-size:13px;color:rgba(57,197,187,.7);margin-bottom:20px;letter-spacing:.04em}
.pills{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.pill{padding:5px 13px;border-radius:50px;font-size:11px;font-weight:700;
  letter-spacing:.06em;text-transform:uppercase;
  background:rgba(57,197,187,.08);border:1px solid var(--border);color:var(--miku);
  backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur))}
.pill.dim{color:var(--sub);font-weight:500;text-transform:none}

/* 波形 */
.waveform{width:100%;max-width:340px;height:52px;display:flex;align-items:flex-end;gap:2px;
  padding:0 10px;margin-bottom:18px;
  background:rgba(57,197,187,.05);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.wbar{flex:1;border-radius:3px 3px 0 0;min-height:3px;
  background:linear-gradient(to top,var(--miku),var(--pink));
  opacity:.35;transition:opacity .1s,transform .1s;transform-origin:bottom}
.wbar.lit{opacity:1;transform:scaleY(1.2);filter:drop-shadow(0 0 5px var(--miku))}

/* 进度 */
.prog-wrap{width:100%;max-width:340px;height:3px;background:rgba(57,197,187,.12);
  border-radius:3px;margin-bottom:8px;cursor:pointer;position:relative}
.prog-fill{height:100%;width:0;background:linear-gradient(90deg,var(--miku),var(--pink));
  border-radius:3px;transition:width .1s linear;position:relative}
.prog-fill::after{content:'';position:absolute;right:-5px;top:-4.5px;
  width:11px;height:11px;border-radius:50%;background:var(--text);
  border:2px solid var(--miku);box-shadow:0 0 8px var(--glow);
  opacity:0;transition:opacity .2s}
.prog-wrap:hover .prog-fill::after{opacity:1}
.prog-time{width:100%;max-width:340px;display:flex;justify-content:space-between;
  font-size:10px;color:var(--sub);margin-bottom:20px;letter-spacing:.04em}

/* 控件 */
.controls{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:28px}
.cbtn{width:48px;height:48px;border-radius:50%;border:1px solid var(--border);
  background:rgba(57,197,187,.07);color:var(--text);
  display:flex;align-items:center;justify-content:center;font-size:17px;
  cursor:pointer;backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
  transition:transform .15s cubic-bezier(.34,1.56,.64,1),background .2s;
  -webkit-tap-highlight-color:transparent}
.cbtn:active{transform:scale(.82)}
.cbtn.play{width:72px;height:72px;font-size:28px;
  background:linear-gradient(135deg,var(--miku),var(--pink));
  border-color:transparent;color:#fff;
  box-shadow:0 14px 44px var(--glow);
  animation:playGlow 3s ease-in-out infinite}
@keyframes playGlow{0%,100%{box-shadow:0 14px 44px var(--glow)}50%{box-shadow:0 18px 56px var(--glow-hi)}}
.cbtn.play:active{transform:scale(.86)}
.swipe-hint{display:flex;flex-direction:column;align-items:center;gap:9px;
  color:var(--sub);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  animation:hintBounce 2.8s ease-in-out infinite;position:relative;z-index:2}
.hint-arrow span{display:block;width:20px;height:1.5px;background:var(--sub);border-radius:2px}
.hint-arrow span:nth-child(1){transform:rotate(30deg) translateX(5px);opacity:.5}
.hint-arrow span:nth-child(2){transform:rotate(-30deg) translateX(-5px);opacity:.5}
@keyframes hintBounce{0%,100%{transform:translateY(0);opacity:.5}50%{transform:translateY(8px);opacity:1}}

/* ── 详情屏 ── */
#detailScreen{scroll-snap-align:start;min-height:100dvh;background:var(--bg);
  padding:52px 18px calc(var(--safe-b)+72px)}
.detail-inner{max-width:460px;margin:0 auto}
.card{background:var(--card);border:1px solid var(--border);border-radius:24px;
  padding:22px 20px;margin-bottom:14px;
  backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
  opacity:0;transform:translateY(28px) scale(.97);
  transition:opacity .6s cubic-bezier(.4,0,.2,1),transform .6s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(57,197,187,.3) 35%,var(--miku) 50%,rgba(57,197,187,.3) 65%,transparent);
  opacity:.7}
.card.vis{opacity:1;transform:translateY(0) scale(1)}
.sec-label{font-size:10px;font-weight:700;color:var(--sub);
  text-transform:uppercase;letter-spacing:.14em;margin-bottom:16px;
  display:flex;align-items:center;gap:10px}
.sec-label::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}
.meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.meta-item{display:flex;align-items:center;gap:12px}
.meta-icon{width:38px;height:38px;border-radius:11px;flex-shrink:0;
  background:rgba(57,197,187,.08);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:17px}
.meta-val{font-size:14px;font-weight:700;line-height:1.2}
.meta-lbl{font-size:10px;color:var(--sub);margin-top:3px;letter-spacing:.04em}
.notes-vis{height:110px;border-radius:14px;background:rgba(57,197,187,.04);
  border:1px solid var(--border);overflow:hidden}
.notes-vis canvas{width:100%;height:100%}
.share-area{text-align:center;padding:28px 0 0}
.share-btn{display:inline-flex;align-items:center;gap:10px;
  padding:16px 40px;border-radius:50px;
  background:linear-gradient(135deg,var(--miku),var(--pink));color:#fff;
  font-size:15px;font-weight:700;border:none;cursor:pointer;
  box-shadow:0 14px 44px var(--glow);
  transition:transform .15s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent}
.share-btn:active{transform:scale(.91)}
.brand{margin-top:16px;font-size:11px;color:var(--sub);letter-spacing:.07em}
#backBtn{position:fixed;bottom:calc(var(--safe-b)+28px);right:20px;z-index:500;
  width:48px;height:48px;border-radius:50%;
  background:var(--card);border:1px solid rgba(57,197,187,.3);
  backdrop-filter:blur(var(--blur));-webkit-backdrop-filter:blur(var(--blur));
  display:flex;align-items:center;justify-content:center;font-size:18px;
  cursor:pointer;color:var(--miku);opacity:0;transform:translateY(20px) scale(.85);
  transition:opacity .3s,transform .35s cubic-bezier(.34,1.56,.64,1);
  -webkit-tap-highlight-color:transparent}
#backBtn.vis{opacity:1;transform:translateY(0) scale(1)}
#backBtn:active{transform:scale(.88)}
</style>
</head>
<body>

<script id="_nj" type="application/json">{{NOTES_JSON}}</script>
<div id="preloader">
  <div class="pre-holo">
    <img class="pre-holo-img" src="assets/miku_char_white.png" alt="Miku">
  </div>
  <div class="pre-title">{{TITLE}}</div>
  <div class="pre-track"><div class="pre-fill" id="preFill"></div></div>
</div>

<section class="screen" id="coverScreen">
  <div class="holo-bg">
    <div class="holo-orb holo-orb-1"></div>
    <div class="holo-orb holo-orb-2"></div>
  </div>

  <div class="char-wrap">
    <img class="char-img" src="assets/miku_char_white.png" alt="初音未来">
    <div class="char-scan"></div>
  </div>

  <div class="cover-text">
    <div class="cover-title">{{TITLE}}</div>
    <div class="lyric-line">{{LYRIC_LINE}}</div>
    <div class="cover-composer">{{COMPOSER}}</div>
    <div class="pills">
      <span class="pill">{{FORMAT_LABEL}}</span>
      <span class="pill dim">♩ {{BPM}}</span>
      <span class="pill dim">{{KEY}}</span>
    </div>
    <div class="waveform" id="waveform"></div>
    <div class="prog-wrap" id="progWrap"><div class="prog-fill" id="progFill"></div></div>
    <div class="prog-time"><span id="tElapsed">0:00</span><span id="tTotal">—</span></div>
    <div class="controls">
      <button class="cbtn" id="btnPrev">⏮</button>
      <button class="cbtn play" id="btnPlay">▶</button>
      <button class="cbtn" id="btnStop">⏹</button>
    </div>
    <div class="swipe-hint">
      <div class="hint-arrow"><span></span><span></span></div>
      <span>滑动查看详情</span>
    </div>
  </div>
</section>

<section class="screen" id="detailScreen">
  <div class="detail-inner">
    <div class="card" data-card>
      <div class="sec-label">乐曲信息</div>
      <div class="meta-grid">
        <div class="meta-item"><div class="meta-icon">🎵</div>
          <div><div class="meta-val">{{TITLE}}</div><div class="meta-lbl">曲名</div></div></div>
        <div class="meta-item"><div class="meta-icon">🎤</div>
          <div><div class="meta-val">{{COMPOSER}}</div><div class="meta-lbl">作曲者</div></div></div>
        <div class="meta-item"><div class="meta-icon">🎼</div>
          <div><div class="meta-val">{{KEY}}</div><div class="meta-lbl">调号</div></div></div>
        <div class="meta-item"><div class="meta-icon">🥁</div>
          <div><div class="meta-val">{{BPM}} BPM</div><div class="meta-lbl">速度</div></div></div>
      </div>
      {{EXTRA_HTML}}
    </div>
    <div class="card" data-card>
      <div class="sec-label">音符可视化</div>
      <div class="notes-vis"><canvas id="notesCanvas"></canvas></div>
    </div>
    {{ABC_SECTION}}{{VIDEO_SECTION}}
    <div class="share-area">
      <button class="share-btn" id="shareBtn"><span>📤</span><span>分享这首乐曲</span></button>
      <div class="brand">由 EP-Agent 生成 · 乐谱海报</div>
    </div>
  </div>
</section>

<button id="backBtn">↑</button>

<style>
.vol-wrap{width:100%;max-width:360px;display:flex;align-items:center;gap:12px;margin-bottom:20px}
.vol-icon{font-size:15px;color:var(--sub);flex-shrink:0}
.vol-slider{flex:1;-webkit-appearance:none;appearance:none;height:2px;border-radius:2px;
  background:rgba(57,197,187,0.2);outline:none;cursor:pointer}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;
  background:var(--miku);box-shadow:0 0 8px var(--glow);cursor:pointer}
.vol-slider::-moz-range-thumb{width:13px;height:13px;border-radius:50%;border:none;background:var(--miku);cursor:pointer}
</style>
<script>
(function(){
'use strict';
const NOTES=(function(){try{return JSON.parse(document.getElementById('_nj').textContent);}catch(e){return[];}})();
const ABC="{{ABC_CONTENT}}";const MIDI_URL="{{MIDI_URL}}";
const C1='#39C5BB',C2='#FF69B4';
const preFill=document.getElementById('preFill');let pct=0;
const tk=setInterval(()=>{pct+=Math.random()*13+3;if(pct>=90){clearInterval(tk);pct=90;}preFill.style.width=pct+'%';},65);
window.addEventListener('load',()=>{clearInterval(tk);preFill.style.width='100%';
  setTimeout(()=>{document.getElementById('preloader').classList.add('out');
    setTimeout(()=>{document.getElementById('preloader').style.display='none';initCards();},900);},300);});
const waveEl=document.getElementById('waveform'),bars=[];const BC=48;
for(let i=0;i<BC;i++){const b=document.createElement('div');b.className='wbar';
  b.style.height=Math.round(7+Math.abs(Math.sin(i*.45+.9))*34)+'px';waveEl.appendChild(b);bars.push(b);}
document.getElementById('progWrap').insertAdjacentHTML('beforebegin',
  '<div class="vol-wrap"><span class="vol-icon">\U0001F508</span><input class="vol-slider" id="volSlider" type="range" min="0" max="1" step="0.01" value="0.85"></div>');
let volGain=null;
let playing=false,raf=null,mPlayer=null,aCtx=null,instr=null,startWall=0,nodes=[],durMs=0;
function getCtx(){if(!aCtx){aCtx=new(window.AudioContext||window.webkitAudioContext)();
  volGain=aCtx.createGain();volGain.gain.value=parseFloat(document.getElementById('volSlider').value);
  volGain.connect(aCtx.destination);}return aCtx;}
document.addEventListener('input',e=>{if(e.target.id==='volSlider'&&volGain)volGain.gain.value=parseFloat(e.target.value);});
function fmt(ms){const s=Math.floor(ms/1000);return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');}
function setUI(p){playing=p;document.getElementById('btnPlay').textContent=p?'\u23f8':'\u25b6';
  if(!p){bars.forEach(b=>b.classList.remove('lit'));setProgress(0);}}
function setProgress(r){document.getElementById('progFill').style.width=(r*100)+'%';
  document.getElementById('tElapsed').textContent=fmt(r*durMs);
  if(durMs>0)document.getElementById('tTotal').textContent=fmt(durMs);}
function litBar(idx){bars.forEach((b,i)=>b.classList.toggle('lit',i===idx));}
function stopAll(){if(mPlayer){try{mPlayer.stop()}catch(e){}}nodes.forEach(n=>{try{n.stop(0)}catch(e){}});
  nodes=[];if(raf){cancelAnimationFrame(raf);raf=null;}setUI(false);}
function animLoop(){function frame(){if(!playing||!durMs)return;
  const r=Math.min((Date.now()-startWall)/durMs,1);setProgress(r);litBar(Math.floor(r*BC));
  if(r<1)raf=requestAnimationFrame(frame);}raf=requestAnimationFrame(frame);}
function playMidi(){stopAll();const ctx=getCtx();if(ctx.state==='suspended')ctx.resume();setUI(true);
  function go(inst){instr=inst;
    mPlayer=new MidiPlayer.Player(ev=>{if(ev.name==='Note on'&&ev.velocity>0&&instr){
      const v=volGain?volGain.gain.value:0.85;instr.play(ev.noteName,ctx.currentTime,{gain:(ev.velocity/127)*v});}
      if(ev.name==='end of track')setUI(false);});
    fetch(MIDI_URL).then(r=>r.arrayBuffer()).then(buf=>{mPlayer.loadArrayBuffer(buf);
      durMs=Math.round((mPlayer.getSongTime()||0)*1000);
      document.getElementById('tTotal').textContent=durMs>0?fmt(durMs):'\u2014';
      startWall=Date.now();mPlayer.play();animLoop();
    }).catch(e=>{console.warn('MIDI load failed',e);playFallback();});}
  if(instr){go(instr);}else{Soundfont.instrument(ctx,'acoustic_grand_piano',{soundfont:'MusyngKite',
    nameToUrl:(n,sf,f)=>'https://cdn.jsdelivr.net/gh/gleitz/midi-js-soundfonts@gh-pages/'+sf+'/'+n+'-'+(f||'mp3')+'.js'
  }).then(go).catch(()=>setUI(false));}}
function playFallback(){if(!NOTES.length)return;stopAll();const ctx=getCtx();
  if(ctx.state==='suspended')ctx.resume();const now=ctx.currentTime;setUI(true);
  durMs=NOTES.reduce((m,n)=>Math.max(m,n.time_ms+(n.duration_ms||200)),0);
  document.getElementById('tTotal').textContent=durMs>0?fmt(durMs):'\u2014';
  startWall=Date.now();const vol=volGain?volGain.gain.value:0.85;
  NOTES.forEach(note=>{const t=note.time_ms/1000,d=(note.duration_ms||200)/1000;
    const osc=ctx.createOscillator(),g=ctx.createGain();osc.connect(g);g.connect(volGain||ctx.destination);
    osc.type='sine';osc.frequency.setValueAtTime(note.midi?440*Math.pow(2,(note.midi-69)/12):440,now+t);
    g.gain.setValueAtTime(0,now+t);g.gain.linearRampToValueAtTime(vol*.15,now+t+.012);
    g.gain.exponentialRampToValueAtTime(.001,now+t+d);osc.start(now+t);osc.stop(now+t+d+.06);nodes.push(osc);});
  animLoop();}
function play(){MIDI_URL?playMidi():playFallback();}
document.getElementById('btnPlay').addEventListener('click',()=>playing?stopAll():play());
document.getElementById('btnStop').addEventListener('click',stopAll);
document.getElementById('btnPrev').addEventListener('click',()=>{stopAll();setTimeout(play,60);});
document.getElementById('progWrap').addEventListener('click',function(e){if(!durMs)return;
  const r=Math.max(0,Math.min(1,(e.clientX-this.getBoundingClientRect().left)/this.offsetWidth));
  if(mPlayer&&playing){try{mPlayer.skipToSeconds(r*durMs/1000);}catch(ex){}startWall=Date.now()-r*durMs;}
  else setProgress(r);});
function drawNotes(){const cv=document.getElementById('notesCanvas');if(!cv)return;
  const W=cv.offsetWidth||320,H=cv.offsetHeight||110;
  cv.width=W*devicePixelRatio;cv.height=H*devicePixelRatio;
  const ctx2=cv.getContext('2d');ctx2.scale(devicePixelRatio,devicePixelRatio);ctx2.clearRect(0,0,W,H);
  if(!NOTES.length){ctx2.fillStyle='rgba(57,197,187,0.2)';ctx2.font='12px sans-serif';
    ctx2.textAlign='center';ctx2.fillText('\u6682\u65e0\u97f3\u7b26\u6570\u636e',W/2,H/2);return;}
  const maxT=NOTES.reduce((m,n)=>Math.max(m,n.time_ms+(n.duration_ms||200)),1);
  const pitches=[...new Set(NOTES.map(n=>n.midi||n.pitch||60))].sort((a,b)=>a-b);
  const rows=Math.max(pitches.length,1);const pidx={};pitches.forEach((p,i)=>pidx[p]=i);
  const barH=Math.max(3,Math.min(8,Math.floor((H-8)/rows)));
  NOTES.forEach(note=>{const x=(note.time_ms/maxT)*W,pw=Math.max(2,((note.duration_ms||200)/maxT)*W);
    const pi=pidx[note.midi||note.pitch||60]??0,y=H-8-((pi/Math.max(rows-1,1))*(H-16));
    ctx2.globalAlpha=.45+(pi/rows)*.45;
    const gr=ctx2.createLinearGradient(x,y,x+pw,y);gr.addColorStop(0,C1);gr.addColorStop(1,C2);
    ctx2.fillStyle=gr;ctx2.beginPath();
    if(ctx2.roundRect)ctx2.roundRect(x,y,pw,barH,barH/2);else ctx2.rect(x,y,pw,barH);
    ctx2.fill();});ctx2.globalAlpha=1;}
function renderAbc(){const el=document.getElementById('abcContainer');if(!el||!ABC||!window.ABCJS)return;
  try{ABCJS.renderAbc('abcContainer',ABC,{responsive:'resize'});}catch(e){}}
function initCards(){if('IntersectionObserver' in window){
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('vis');obs.unobserve(e.target);}});},{threshold:.1});
  document.querySelectorAll('[data-card]').forEach(el=>obs.observe(el));}
  else{document.querySelectorAll('[data-card]').forEach(el=>el.classList.add('vis'));}}
const backBtn=document.getElementById('backBtn');
window.addEventListener('scroll',()=>{backBtn.classList.toggle('vis',window.scrollY>window.innerHeight*.3);},{passive:true});
backBtn.addEventListener('click',()=>{window.scrollTo({top:0,behavior:'smooth'});});
document.getElementById('shareBtn').addEventListener('click',()=>{const lbl=document.querySelector('.share-btn span:last-child');
  if(navigator.share){navigator.share({title:'{{TITLE}}',url:location.href}).catch(()=>{});}
  else{navigator.clipboard.writeText(location.href).then(()=>{lbl.textContent='\u2713 \u94fe\u63a5\u5df2\u590d\u5236';setTimeout(()=>lbl.textContent='\u5206\u4eab\u8fd9\u9996\u4e50\u66f2',2200);}).catch(()=>{});}});
window.addEventListener('load',()=>{drawNotes();renderAbc();});
window.addEventListener('resize',drawNotes);
}());
</script>
