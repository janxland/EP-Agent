<!DOCTYPE html>
<html lang="zh-CN">
<!--
  EP-Agent H5 模板：罗小黑（LuoXiaoHei）v7.0
  ════════════════════════════════════════════════
  【变量说明 — 大模型修改指南】

  所有变量集中在页面底部 <script id="ep-config"> 的 JSON 对象中，
  修改时只需编辑该 JSON，无需在 HTML 各处查找替换。

  必填变量：
    TITLE        曲名，如 "晚安喵"
    COMPOSER     作曲者，如 "罗小黑主题曲"
    BPM          速度数值，如 "120"
    KEY          调号，如 "C 大调"
    FORMAT_LABEL 格式标签，如 "Sky 谱 · MIDI"

  媒体变量（留空则对应区域自动隐藏）：
    MIDI_URL     MIDI 文件相对路径，如 "./晚安喵.mid"
    ABC_CONTENT  ABC 乐谱文本（多行字符串用 \n 转义）

  装饰变量（可保持默认）：
    NIGHT_MOOD   封面情绪词，如 "深夜 · 月光 · 轻柔"
    CAT_EMOJI    猫咪表情，如 "🐱"
    THEME        主题色关键词（暂未使用，留作扩展）

  视频嵌入（留空则隐藏视频区）：
    VIDEO_URL      视频链接或 embed 地址
                   · B站：https://player.bilibili.com/player.html?bvid=BVxxxxxx
                   · 抖音：https://open.douyin.com/player/video?vid=xxxxxxx
                   · YouTube：https://www.youtube.com/embed/xxxxxxx
                   · 通用 iframe src：任意 https:// 地址
    VIDEO_TITLE    视频标题，如 "罗小黑战记 OP — 演奏版"
    VIDEO_PLATFORM 平台名，如 "哔哩哔哩" / "抖音" / "YouTube"（用于显示图标）

  扩展变量：
    EXTRA_HTML   任意额外 HTML 片段，注入到乐曲信息卡底部
                 例：<p>这是一首...</p> 或 <div class="tag">原创</div>
    NOTES_JSON   音符数组 JSON（振荡器降级播放用），格式：
                 [{"midi":60,"time_ms":0,"duration_ms":400}, ...]
════════════════════════════════════════════════
-->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0D0B1A">
<meta name="description" content="{{TITLE}} — 由 EP-Agent 生成的乐谱海报">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>{{TITLE}} — 罗小黑 × EP-Agent</title>

<!-- CDN 依赖 -->
<script src="https://cdn.jsdelivr.net/npm/midi-player-js@2.0.16/browser/midiplayer.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/soundfont-player@0.12.0/dist/soundfont-player.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/abcjs/6.4.4/abcjs-basic-min.js"></script>
<script src="https://cdn.jsdelivr.net/combine/npm/tone@14.7.58,npm/@magenta/music@1.23.1/es6/core.js,npm/html-midi-player@1.5.0"></script>

<!-- 模板样式 -->
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 星空背景 -->
<canvas id="starCanvas" aria-hidden="true"></canvas>

<!-- ══════════════════════════════════════════════
     预加载屏
═══════════════════════════════════════════════ -->
<div id="preloader" role="status" aria-label="正在加载">
  <div class="pre-scene" aria-hidden="true">
    <img class="pre-cat-img" src="assets/lxh_cat_white.png" alt="">
    <div class="pre-ring"></div>
    <div class="pre-ring"></div>
    <div class="pre-ring"></div>
    <div class="pre-moon">🌙</div>
  </div>
  <div class="pre-title" id="preTitle">加载中…</div>
  <div class="pre-track" role="progressbar" aria-valuemin="0" aria-valuemax="100">
    <div class="pre-fill" id="preFill"></div>
  </div>
  <div style="font-size:10px;color:rgba(200,180,230,0.38);letter-spacing:.1em">正在加载音乐资源…</div>
</div>

<!-- ══════════════════════════════════════════════
     封面屏
═══════════════════════════════════════════════ -->
<section class="screen" id="coverScreen" aria-label="封面">
  <canvas id="fireflyCanvas" aria-hidden="true"></canvas>

  <!-- 月亮 & 星星装饰 -->
  <div class="moon-deco" aria-hidden="true">🌕</div>
  <div class="star-deco" style="top:18%;left:12%;animation-delay:.4s" aria-hidden="true">✦</div>
  <div class="star-deco" style="top:32%;right:10%;animation-delay:1.1s;font-size:10px" aria-hidden="true">✧</div>
  <div class="star-deco" style="top:55%;left:8%;animation-delay:.7s;font-size:11px" aria-hidden="true">✦</div>
  <div class="star-deco" style="bottom:22%;right:14%;animation-delay:1.6s" aria-hidden="true">✧</div>

  <!-- 猫咪立绘 -->
  <div class="cat-wrap" aria-hidden="true">
    <img class="cat-img" src="assets/lxh_cat_white.png" alt="罗小黑">
  </div>

  <!-- 封面文字 & 播放器 -->
  <div class="cover-text">
    <div class="night-mood" id="coverMood" aria-hidden="true"></div>
    <h1 class="cover-title" id="coverTitle"></h1>
    <div class="cover-composer" id="coverComposer"></div>

    <div class="pills" aria-label="曲目信息">
      <span class="pill" id="pillFormat"></span>
      <span class="pill dim" id="pillBpm"></span>
      <span class="pill dim" id="pillKey"></span>
    </div>

    <!-- 波形可视化 -->
    <div class="waveform" id="waveform" aria-hidden="true"></div>

    <!-- 音量 -->
    <div class="vol-wrap">
      <span class="vol-icon" aria-hidden="true">🔈</span>
      <input class="vol-slider" id="volSlider" type="range"
             min="0" max="1" step="0.01" value="0.85"
             aria-label="音量">
    </div>

    <!-- 进度条 -->
    <div class="prog-wrap" id="progWrap"
         role="slider" aria-label="播放进度"
         aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div class="prog-fill" id="progFill"></div>
    </div>
    <div class="prog-time" aria-live="off">
      <span id="tElapsed">0:00</span>
      <span id="tTotal">—</span>
    </div>

    <!-- 控制按钮 -->
    <div class="controls" role="group" aria-label="播放控制">
      <button class="cbtn" id="btnPrev" aria-label="重新播放">⏮</button>
      <button class="cbtn play" id="btnPlay" aria-label="播放">▶</button>
      <button class="cbtn" id="btnStop" aria-label="停止">⏹</button>
    </div>

    <!-- 滑动提示 -->
    <div class="swipe-hint" aria-hidden="true">
      <div class="scroll-arrow">
        <span></span><span></span><span></span>
      </div>
      <span class="swipe-label">查看详情</span>
    </div>
  </div>
</section>

<!-- ══════════════════════════════════════════════
     详情屏
═══════════════════════════════════════════════ -->
<section class="screen" id="detailScreen" aria-label="详情">
  <div class="detail-inner">

    <!-- 详情标题 -->
    <header class="detail-header">
      <div class="detail-header-title" id="detailTitle">🌙 加载中…</div>
      <div class="detail-header-sub">乐谱详情 · 由 EP-Agent 生成</div>
    </header>

    <!-- Now Playing 指示条 -->
    <div class="now-playing-bar" id="nowPlayingBar" aria-live="polite" aria-atomic="true">
      <div class="np-dots" aria-hidden="true">
        <div class="np-dot"></div><div class="np-dot"></div><div class="np-dot"></div>
        <div class="np-dot"></div><div class="np-dot"></div>
      </div>
      <div>
        <div class="np-title" id="npTitle"></div>
        <div class="np-text">正在播放</div>
      </div>
    </div>

    <!-- 乐曲信息卡 -->
    <div class="card" data-card>
      <div class="sec-label">🎵 乐曲信息</div>
      <div class="meta-grid" id="metaGrid">
        <!-- 由 player.js 根据 ep-config 动态填充 -->
      </div>
      <!-- EXTRA_HTML 注入区 -->
      <div id="extraHtmlSlot"></div>
    </div>

    <!-- MIDI 可视化卡 -->
    <div class="card" data-card id="midiVizCard">
      <div class="sec-label">🎹 演奏可视化</div>
      <div class="midi-viz-wrap" id="midiVizWrap">
        <div class="midi-viz-placeholder" id="midiVizPlaceholder">
          <div class="viz-icon">🎵</div>
          <div class="viz-hint">加载 MIDI 后自动演奏可视化</div>
        </div>
      </div>
    </div>

    <!-- ABC 乐谱卡（有内容才显示） -->
    <div class="card" data-card id="abcCard" style="display:none">
      <div class="sec-label">🎼 乐谱预览</div>
      <div id="abcContainer"></div>
    </div>

    <!-- 视频嵌入卡（有 VIDEO_URL 才显示） -->
    <div class="card" data-card id="videoCard" style="display:none">
      <div class="sec-label" id="videoLabel">🎬 视频欣赏</div>
      <div class="video-wrap" id="videoWrap">
        <!-- 由 player.js 根据 VIDEO_URL 动态注入 iframe -->
      </div>
    </div>

    <!-- 分享区 -->
    <div class="share-area">
      <button class="share-btn" id="shareBtn">
        <span aria-hidden="true">🌙</span>
        <span>分享这首乐曲</span>
      </button>
      <div class="brand">由 EP-Agent 生成 · 乐谱海报</div>
    </div>

  </div>
</section>

<!-- 返回顶部 -->
<button id="backBtn" aria-label="返回封面">↑</button>

<!-- ══════════════════════════════════════════════
     【核心配置区】— 大模型修改此处即可
     所有模板变量集中在此 JSON 对象中
     渲染引擎替换 {{变量名}} 后，player.js 读取并填充页面
═══════════════════════════════════════════════ -->
<script id="ep-config" type="application/json">
{
  "TITLE":         "{{TITLE}}",
  "COMPOSER":      "{{COMPOSER}}",
  "BPM":           "{{BPM}}",
  "KEY":           "{{KEY}}",
  "FORMAT_LABEL":  "{{FORMAT_LABEL}}",
  "MIDI_URL":      "{{MIDI_URL}}",
  "ABC_CONTENT":   "{{ABC_CONTENT}}",
  "NIGHT_MOOD":    "{{NIGHT_MOOD}}",
  "CAT_EMOJI":     "{{CAT_EMOJI}}",
  "VIDEO_URL":     "{{VIDEO_URL}}",
  "VIDEO_TITLE":   "{{VIDEO_TITLE}}",
  "VIDEO_PLATFORM":"{{VIDEO_PLATFORM}}",
  "EXTRA_HTML":    "{{EXTRA_HTML}}",
  "NOTES_JSON":    {{NOTES_JSON}}
}
</script>

<!-- 播放器逻辑 -->
<script src="player.js"></script>
</body>
</html>
