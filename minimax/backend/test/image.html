<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiniMax 图像生成测试</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
         background:#f5f5f7; color:#1d1d1f; }
  .header { background:linear-gradient(135deg,#a18cd1,#fbc2eb); color:#fff;
            padding:20px 24px; display:flex; align-items:center; gap:12px; }
  .header h1 { font-size:1.3rem; }
  .header a { color:#fff; opacity:.8; text-decoration:none; font-size:.85rem; }
  .header a:hover { opacity:1; }
  .container { max-width:900px; margin:0 auto; padding:24px; }
  .panel { background:#fff; border-radius:16px; padding:24px; margin-bottom:16px;
           box-shadow:0 2px 12px rgba(0,0,0,.06); }
  .panel h2 { font-size:1.1rem; margin-bottom:16px; }
  .row { display:flex; gap:12px; margin-bottom:12px; flex-wrap:wrap; }
  .form-group { flex:1; min-width:160px; }
  .form-group label { display:block; font-size:.8rem; font-weight:600; color:#555; margin-bottom:4px; }
  .form-group input,.form-group select,.form-group textarea { width:100%; padding:8px 10px;
    border:1px solid #d1d1d6; border-radius:8px; font-size:.85rem; outline:none; }
  .form-group textarea { resize:vertical; min-height:80px; font-size:.9rem; }
  .form-group textarea:focus { border-color:#a18cd1; }
  .btn { padding:10px 24px; border:none; border-radius:10px; font-size:.9rem; font-weight:600;
         cursor:pointer; transition:all .15s; }
  .btn-primary { background:#a18cd1; color:#fff; }
  .btn-primary:hover { background:#8e7bc2; }
  .btn-primary:disabled { opacity:.5; cursor:not-allowed; }
  .tab-bar { display:flex; gap:4px; margin-bottom:16px; }
  .tab { padding:8px 16px; border-radius:8px 8px 0 0; cursor:pointer; font-size:.85rem;
         background:#e8e8ed; color:#666; border:none; font-weight:500; }
  .tab.active { background:#fff; color:#a18cd1; font-weight:600; }
  .image-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:16px;margin-top:12px; }
  .image-card { background:#f8f9fa; border-radius:10px; overflow:hidden; }
  .image-card img { width:100%; display:block; }
  .image-card .info { padding:10px; font-size:.8rem; color:#666; }
  .status { font-size:.85rem; color:#666; margin-top:8px; }
  .loading { display:flex;align-items:center;gap:8px;padding:12px; }
  .spinner { width:20px;height:20px;border:2px solid #f0f0f0;border-top-color:#a18cd1;
             border-radius:50%;animation:spin .8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="header">
  <a href="/">← 返回</a>
  <h1>🖼️ 图像生成</h1>
</div>
<div class="container">
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('text2img',this)">文生图</button>
    <button class="tab" onclick="switchTab('img2img',this)">图生图</button>
  </div>

  <div class="panel" id="tabText2Img">
    <h2>📝 文生图</h2>
    <div class="row">
      <div class="form-group">
        <label>模型</label>
        <select id="t2iModel">
          <option value="image-01">image-01</option>
        </select>
      </div>
      <div class="form-group">
        <label>画面比例</label>
        <select id="t2iRatio">
          <option value="">默认</option>
          <option value="16:9">16:9 (横屏)</option>
          <option value="4:3">4:3</option>
          <option value="3:2">3:2</option>
          <option value="1:1">1:1 (正方形)</option>
          <option value="2:3">2:3</option>
          <option value="3:4">3:4</option>
          <option value="9:16">9:16 (竖屏)</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>提示词</label>
      <textarea id="t2iPrompt" rows="3" placeholder="描述你想要的图像...">一只可爱的橘猫在阳光下的窗台上打盹，温暖的光线，柔和的色调，照片级真实感</textarea>
    </div>
    <button class="btn btn-primary" id="t2iBtn" onclick="textToImage()">🖼️ 生成图像</button>
    <div class="status" id="t2iStatus"></div>
    <div class="image-grid" id="t2iResult"></div>
  </div>

  <div class="panel" id="tabImg2Img" style="display:none;">
    <h2>🔁 图生图</h2>
    <div class="row">
      <div class="form-group">
        <label>参考图像 URL</label>
        <input id="i2iImageUrl" placeholder="输入参考图 URL">
      </div>
      <div class="form-group">
        <label>或上传图像</label>
        <input type="file" id="i2iFile" accept="image/*">
      </div>
    </div>
    <div class="form-group">
      <label>描述提示词</label>
      <textarea id="i2iPrompt" rows="3" placeholder="描述想要的变换...">将这只猫变成赛博朋克风格，霓虹灯光</textarea>
    </div>
    <button class="btn btn-primary" id="i2iBtn" onclick="imageToImage()">🖼️ 生成图像</button>
    <div class="status" id="i2iStatus"></div>
    <div class="image-grid" id="i2iResult"></div>
  </div>
</div>

<script>
const API = '';

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabText2Img').style.display = tab === 'text2img' ? 'block' : 'none';
  document.getElementById('tabImg2Img').style.display = tab === 'img2img' ? 'block' : 'none';
}

async function textToImage() {
  const btn = document.getElementById('t2iBtn');
  const status = document.getElementById('t2iStatus');
  const result = document.getElementById('t2iResult');
  btn.disabled = true;
  status.innerHTML = '<div class="loading"><div class="spinner"></div>🎨 正在生成图像...</div>';
  result.innerHTML = '';

  try {
    const resp = await fetch(`${API}/api/v1/images/generations`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: document.getElementById('t2iModel').value,
        prompt: document.getElementById('t2iPrompt').value.trim(),
        aspect_ratio: document.getElementById('t2iRatio').value || undefined,
      }),
    });
    const data = await resp.json();
    renderImageResult(data, status, result);
  } catch (err) {
    status.textContent = '❌ ' + err.message;
  } finally {
    btn.disabled = false;
  }
}

async function imageToImage() {
  const btn = document.getElementById('i2iBtn');
  const status = document.getElementById('i2iStatus');
  const result = document.getElementById('i2iResult');
  btn.disabled = true;
  status.innerHTML = '<div class="loading"><div class="spinner"></div>🎨 正在生成图像...</div>';
  result.innerHTML = '';

  try {
    let imageUrl = document.getElementById('i2iImageUrl').value.trim();
    const file = document.getElementById('i2iFile').files[0];

    if (file && !imageUrl) {
      // 上传文件
      const formData = new FormData();
      formData.append('file', file);
      formData.append('purpose', 'general');
      const uploadResp = await fetch(`${API}/api/v1/files/upload?purpose=general`, { method: 'POST', body: formData });
      const uploadData = await uploadResp.json();
      imageUrl = uploadData.file_id;
      if (!imageUrl) throw new Error('文件上传失败');
    }

    const resp = await fetch(`${API}/api/v1/images/generations`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'image-01',
        prompt: document.getElementById('i2iPrompt').value.trim(),
        subject_reference: imageUrl ? [{ type: 'file', file_id: imageUrl }] : undefined,
      }),
    });
    const data = await resp.json();
    renderImageResult(data, status, result);
  } catch (err) {
    status.textContent = '❌ ' + err.message;
  } finally {
    btn.disabled = false;
  }
}

function renderImageResult(data, status, resultDiv) {
  const images = data.image || data.data?.image || data.images || data.data?.images || [];
  const imageList = Array.isArray(images) ? images : (images ? [images] : []);
  const rawImageUrl = data.image_url || data.data?.image_url;

  if (imageList.length > 0) {
    let html = imageList.map(img => {
      const url = img.url || img.image_url || img.file_id || '';
      const fileId = img.file_id || '';
      const displayUrl = url.startsWith('http') ? url : `${API}/api/v1/media/${fileId}`;
      return `<div class="image-card"><img src="${displayUrl}" alt="生成图像"><div class="info">${fileId ? `file_id: ${fileId}` : ''}</div></div>`;
    }).join('');
    resultDiv.innerHTML = html;
    status.textContent = `✅ 生成完成 (${imageList.length} 张)`;
  } else if (rawImageUrl) {
    resultDiv.innerHTML = `<div class="image-card"><img src="${rawImageUrl}" alt="生成图像"></div>`;
    status.textContent = '✅ 生成完成';
  } else {
    // 尝试从 file_id 构造
    const fileId = data.file_id || data.data?.file_id;
    if (fileId) {
      resultDiv.innerHTML = `<div class="image-card"><img src="${API}/api/v1/media/${fileId}" alt="生成图像"></div>`;
      status.textContent = `✅ 生成完成 (file_id: ${fileId})`;
    } else {
      resultDiv.innerHTML = `<pre style="font-size:.8rem;background:#f0f0f0;padding:12px;border-radius:8px;overflow:auto;">${JSON.stringify(data, null, 2)}</pre>`;
      status.textContent = '⚠️ 未解析到图像 URL';
    }
  }
}
</script>
</body>
</html>
