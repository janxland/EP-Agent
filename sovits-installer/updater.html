<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPT-SoVITS · 更新</title>
<script src="https://cdn.tailwindcss.com/3.4.17"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box}
  body{font-family:'Inter',sans-serif;background:#0a0a0f;color:#e2e8f0;overflow-x:hidden;margin:0}
  .bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(139,92,246,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,0.03) 1px,transparent 1px);background-size:40px 40px}
  .bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 60% 40% at 20% 20%,rgba(59,130,246,0.1) 0%,transparent 60%),radial-gradient(ellipse 40% 30% at 80% 80%,rgba(139,92,246,0.08) 0%,transparent 60%)}
  .glass{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);backdrop-filter:blur(20px);border-radius:16px}
  .glass-dark{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.06);backdrop-filter:blur(12px);border-radius:12px}
  .grad-text{background:linear-gradient(135deg,#a78bfa 0%,#ec4899 50%,#f97316 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .grad-text-blue{background:linear-gradient(135deg,#60a5fa 0%,#a78bfa 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .terminal{font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.7;background:#060810;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:14px;max-height:320px;overflow-y:auto}
  .terminal::-webkit-scrollbar{width:4px}
  .terminal::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:2px}
  .log-info{color:#94a3b8}.log-success{color:#22c55e}.log-warn{color:#f59e0b}.log-error{color:#ef4444}.log-cmd{color:#60a5fa}.log-highlight{color:#a78bfa}
  .btn-primary{background:linear-gradient(135deg,#1d4ed8,#7c3aed);border:none;color:white;font-weight:600;padding:12px 24px;border-radius:10px;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;font-size:14px}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(59,130,246,0.4)}
  .btn-primary:disabled{opacity:0.4;cursor:not-allowed;transform:none;box-shadow:none}
  .btn-secondary{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);color:#cbd5e1;font-weight:500;padding:10px 18px;border-radius:10px;cursor:pointer;transition:all 0.2s;display:inline-flex;align-items:center;gap:8px;font-size:13px}
  .btn-secondary:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}
  .step-card{transition:all 0.3s;border-radius:12px;border:1px solid rgba(255,255,255,0.06);padding:14px;background:rgba(0,0,0,0.2)}
  .step-card.running{border-color:rgba(96,165,250,0.4);background:rgba(96,165,250,0.05)}
  .step-card.done{border-color:rgba(34,197,94,0.4);background:rgba(34,197,94,0.04)}
  .step-card.error{border-color:rgba(239,68,68,0.4);background:rgba(239,68,68,0.04)}
  .step-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0;background:rgba(96,165,250,0.15);border:1px solid rgba(96,165,250,0.3);color:#60a5fa;transition:all 0.3s}
  .step-num.done{background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.4);color:#22c55e}
  .step-num.running{background:rgba(96,165,250,0.25);border-color:#60a5fa;color:#fff}
  .step-num.error{background:rgba(239,68,68,0.15);border-color:rgba(239,68,68,0.4);color:#ef4444}
  .progress-bar{height:5px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden}
  .progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#3b82f6,#a78bfa);transition:width 0.6s cubic-bezier(0.4,0,0.2,1)}
  .badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
  .badge-idle{background:rgba(100,116,139,0.15);color:#64748b;border:1px solid rgba(100,116,139,0.2)}
  .badge-running{background:rgba(96,165,250,0.15);color:#60a5fa;border:1px solid rgba(96,165,250,0.3)}
  .badge-done{background:rgba(34,197,94,0.12);color:#22c55e;border:1px solid rgba(34,197,94,0.25)}
  .badge-error{background:rgba(239,68,68,0.12);color:#ef4444;border:1px solid rgba(239,68,68,0.25)}
  .info-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.05)}
  .info-row:last-child{border-bottom:none}
  .option-pill{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;border:1px solid rgba(255,255,255,0.1);color:#64748b;background:rgba(255,255,255,0.03)}
  .option-pill.selected{background:rgba(96,165,250,0.15);color:#60a5fa;border-color:rgba(96,165,250,0.4)}
  .option-pill:hover:not(.selected){border-color:rgba(255,255,255,0.2);color:#94a3b8}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin 1s linear infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .pulse{animation:pulse 1.2s ease-in-out infinite}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .fade-in{animation:fadeIn 0.4s ease forwards}
  @keyframes successPop{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
  .success-pop{animation:successPop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards}
  ::-webkit-scrollbar{width:6px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:3px}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="relative z-10 min-h-screen p-6">

  <!-- 顶部导航 -->
  <div class="max-w-5xl mx-auto mb-6 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center" style="background:linear-gradient(135deg,#1d4ed8,#7c3aed)">
        <i class="fa-solid fa-rotate text-white"></i>
      </div>
      <div>
        <h1 class="text-lg font-bold grad-text-blue leading-tight">GPT-SoVITS</h1>
        <p class="text-xs text-slate-500">版本更新</p>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <span class="badge badge-idle" id="overallBadge"><span class="w-1.5 h-1.5 rounded-full bg-slate-500"></span>就绪</span>
      <a href="/launcher" class="btn-secondary text-xs py-2 px-3"><i class="fa-solid fa-rocket text-xs"></i>启动页</a>
      <a href="/install" class="btn-secondary text-xs py-2 px-3"><i class="fa-solid fa-download text-xs"></i>安装页</a>
    </div>
  </div>

  <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-5">

    <!-- 左栏 -->
    <div class="lg:col-span-1 space-y-4">

      <!-- 当前版本信息 -->
      <div class="glass p-4">
        <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-3">版本信息</p>
        <div>
          <div class="info-row">
            <span class="text-sm text-slate-400">安装目录</span>
            <span class="text-xs font-mono text-slate-300 truncate max-w-36" id="infoDir" title="">检测中…</span>
          </div>
          <div class="info-row">
            <span class="text-sm text-slate-400">当前提交</span>
            <span class="text-xs font-mono text-slate-400 truncate max-w-36" id="infoCurrentCommit">—</span>
          </div>
          <div class="info-row">
            <span class="text-sm text-slate-400">最新提交</span>
            <span class="text-xs font-mono text-slate-400 truncate max-w-36" id="infoLatestCommit">—</span>
          </div>
          <div class="info-row">
            <span class="text-sm text-slate-400">更新状态</span>
            <span class="text-sm" id="infoUpdateStatus"><span class="text-slate-500">未检测</span></span>
          </div>
        </div>
        <button class="btn-secondary w-full mt-3 justify-center text-xs py-2" id="btnCheckVersion">
          <i class="fa-solid fa-magnifying-glass text-xs"></i>检查远程更新
        </button>
      </div>

      <!-- 更新步骤 -->
      <div class="glass p-4">
        <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-3">更新步骤</p>
        <div class="space-y-2" id="stepList">
          <!-- 动态生成 -->
        </div>
      </div>

      <!-- 更新配置 -->
      <div class="glass p-4" id="configPanel">
        <p class="text-xs text-slate-500 font-semibold uppercase tracking-wider mb-3">更新配置</p>
        <div class="mb-4">
          <p class="text-xs text-slate-500 mb-2">设备类型</p>
          <div class="flex flex-wrap gap-2" id="deviceOptions">
            <button class="option-pill selected" data-val="CPU">CPU</button>
            <button class="option-pill" data-val="CU126">CUDA 12.6</button>
            <button class="option-pill" data-val="CU128">CUDA 12.8</button>
          </div>
        </div>
        <div class="mb-3">
          <p class="text-xs text-slate-500 mb-2">模型下载源</p>
          <div class="flex flex-wrap gap-2" id="sourceOptions">
            <button class="option-pill" data-val="HF">HuggingFace</button>
            <button class="option-pill selected" data-val="HF-Mirror">HF 镜像</button>
            <button class="option-pill" data-val="ModelScope">ModelScope</button>
          </div>
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" id="dlUVR5" class="w-4 h-4 rounded" style="accent-color:#60a5fa">
          <label for="dlUVR5" class="text-sm text-slate-400 cursor-pointer">同步更新 UVR5 模型</label>
        </div>
      </div>
    </div>

    <!-- 右栏 -->
    <div class="lg:col-span-2 space-y-4">

      <!-- 更新操作区 -->
      <div class="glass p-6">
        <div class="flex items-start justify-between mb-2">
          <div>
            <h2 class="text-lg font-semibold text-white">拉取最新代码</h2>
            <p class="text-sm text-slate-400 mt-1">从 GitHub 拉取最新代码并更新 Python 依赖</p>
          </div>
          <span class="badge badge-idle" id="stepBadge"><span class="w-1.5 h-1.5 rounded-full bg-slate-500"></span>就绪</span>
        </div>

        <!-- 进度条 -->
        <div class="my-4">
          <div class="flex justify-between items-center mb-2">
            <span class="text-xs text-slate-500">更新进度</span>
            <span class="text-xs text-slate-400 font-mono" id="progressPct">0%</span>
          </div>
          <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
        </div>

        <!-- 按钮 -->
        <div class="flex flex-wrap gap-3">
          <button class="btn-primary" id="btnUpdate">
            <i class="fa-solid fa-cloud-arrow-down text-sm"></i>开始更新
          </button>
          <button class="btn-secondary hidden" id="btnRetry">
            <i class="fa-solid fa-rotate-right text-sm"></i>重试
          </button>
          <button class="btn-secondary" id="btnCheckOnly">
            <i class="fa-solid fa-magnifying-glass text-sm"></i>仅检查（不更新）
          </button>
        </div>

        <!-- 警告提示 -->
        <div class="mt-4 p-3 rounded-lg" style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2)">
          <div class="flex items-start gap-2">
            <i class="fa-solid fa-triangle-exclamation text-yellow-400 text-sm mt-0.5 flex-shrink-0"></i>
            <p class="text-xs text-yellow-300/80">更新前建议先停止 WebUI 服务。更新过程将重置本地代码修改（git reset --hard），请提前备份自定义文件。</p>
          </div>
        </div>
      </div>

      <!-- 更新完成卡 -->
      <div class="glass p-6 hidden text-center" id="doneCard">
        <div class="success-pop inline-block mb-4">
          <div class="w-16 h-16 rounded-full flex items-center justify-center mx-auto" style="background:linear-gradient(135deg,rgba(96,165,250,0.2),rgba(96,165,250,0.05));border:2px solid rgba(96,165,250,0.4)">
            <i class="fa-solid fa-check text-2xl text-blue-400"></i>
          </div>
        </div>
        <h3 class="text-xl font-bold text-white mb-2">更新完成！</h3>
        <p class="text-slate-400 text-sm mb-2" id="doneCommit"></p>
        <p class="text-slate-400 text-sm mb-5">代码和依赖已更新至最新版本</p>
        <div class="flex justify-center gap-3">
          <a href="/launcher" class="btn-primary inline-flex">
            <i class="fa-solid fa-rocket text-sm"></i>前往启动页
          </a>
          <button class="btn-secondary" id="btnUpdateAgain">
            <i class="fa-solid fa-rotate text-sm"></i>再次更新
          </button>
        </div>
      </div>

      <!-- 终端日志 -->
      <div class="glass p-4">
        <div class="flex items-center justify-between mb-3">
          <div class="flex items-center gap-2">
            <div class="flex gap-1.5">
              <div class="w-3 h-3 rounded-full bg-red-500/70"></div>
              <div class="w-3 h-3 rounded-full bg-yellow-500/70"></div>
              <div class="w-3 h-3 rounded-full bg-green-500/70"></div>
            </div>
            <span class="text-xs text-slate-500 font-medium ml-1">更新日志</span>
          </div>
          <button class="btn-secondary text-xs py-1 px-3" id="btnClearLog"><i class="fa-solid fa-trash text-xs"></i></button>
        </div>
        <div class="terminal" id="terminal"></div>
      </div>
    </div>
  </div>
</div>

<script>
const BACKEND = 'http://localhost:3333';
const state = { device:'CPU', source:'HF-Mirror', dlUVR5:false, running:false, installDir:'' };

const UPDATE_STEPS = [
  { id:'pull',        title:'拉取最新代码', desc:'git fetch + reset --hard' },
  { id:'update_deps', title:'更新 Python 依赖', desc:'重新运行安装脚本' },
  { id:'verify',      title:'验证更新',     desc:'检查 PyTorch 版本与提交记录' },
];

// ── 初始化 ────────────────────────────────────────────────────
window.addEventListener('load', () => {
  renderStepList();
  initPills();
  initButtons();
  connectSSE();
  loadStatus();
});

function renderStepList() {
  document.getElementById('stepList').innerHTML = UPDATE_STEPS.map((s, i) => `
    <div class="step-card flex items-center gap-3" id="sc${i}">
      <div class="step-num" id="sn${i}"><span>${i+1}</span></div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium text-slate-200">${s.title}</p>
        <p class="text-xs text-slate-500">${s.desc}</p>
      </div>
    </div>`).join('');
}

function updateStep(idx, status) {
  const card = document.getElementById(`sc${idx}`);
  const num  = document.getElementById(`sn${idx}`);
  if (!card||!num) return;
  card.className = `step-card flex items-center gap-3 ${status}`;
  num.className  = `step-num ${status}`;
  const icons = { done:'<i class="fa-solid fa-check text-xs"></i>', error:'<i class="fa-solid fa-xmark text-xs"></i>', running:'<i class="fa-solid fa-spinner spin text-xs"></i>' };
  num.innerHTML = icons[status] || `<span>${idx+1}</span>`;
}

function initPills() {
  ['deviceOptions','sourceOptions'].forEach(gid => {
    document.getElementById(gid).querySelectorAll('.option-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById(gid).querySelectorAll('.option-pill').forEach(b=>b.classList.remove('selected'));
        btn.classList.add('selected');
        if (gid==='deviceOptions') state.device = btn.dataset.val;
        if (gid==='sourceOptions') state.source = btn.dataset.val;
      });
    });
  });
  document.getElementById('dlUVR5').addEventListener('change', e => state.dlUVR5 = e.target.checked);
}

function initButtons() {
  document.getElementById('btnUpdate').addEventListener('click', startUpdate);
  document.getElementById('btnRetry').addEventListener('click', () => { document.getElementById('btnRetry').classList.add('hidden'); startUpdate(); });
  document.getElementById('btnCheckOnly').addEventListener('click', checkOnly);
  document.getElementById('btnCheckVersion').addEventListener('click', checkRemoteVersion);
  document.getElementById('btnClearLog').addEventListener('click', () => document.getElementById('terminal').innerHTML = '');
  document.getElementById('btnUpdateAgain').addEventListener('click', () => {
    document.getElementById('doneCard').classList.add('hidden');
    renderStepList();
    setProgress(0);
    setBadge('overallBadge','idle','就绪');
    setBadge('stepBadge','idle','就绪');
    document.getElementById('btnUpdate').classList.remove('hidden');
  });
}

// ── 加载状态 ─────────────────────────────────────────────────
async function loadStatus() {
  try {
    const s = await fetch(`${BACKEND}/status`).then(r=>r.json());
    state.installDir = s.installDir || './GPT-SoVITS';
    const dir = s.installDir || '—';
    const dirEl = document.getElementById('infoDir');
    dirEl.textContent = dir.length > 30 ? '…'+dir.slice(-28) : dir;
    dirEl.title = dir;
    document.getElementById('infoCurrentCommit').textContent = s.gitLog || '—';
    // 自动检测 CUDA 并选择设备
    const env = await fetch(`${BACKEND}/detect`).then(r=>r.json()).catch(()=>({}));
    if (env.cuda && env.cuda.raw && env.os !== 'darwin') {
      selectPill('deviceOptions', env.cuda.device);
      state.device = env.cuda.device;
      log('success', `✓ 检测到 CUDA ${env.cuda.raw}，已自动选择 ${env.cuda.device}`);
    }
  } catch(_) {
    log('warn', '后端未连接，请先运行 start.bat / start.sh');
  }
}

// ── 检查远程版本 ──────────────────────────────────────────────
async function checkRemoteVersion() {
  const btn = document.getElementById('btnCheckVersion');
  btn.innerHTML = '<i class="fa-solid fa-spinner spin text-xs"></i> 检查中…';
  btn.disabled = true;
  log('info', '正在检查远程最新版本…');
  try {
    // 通过后端执行 git fetch + git log 对比
    const res = await fetch(`${BACKEND}/update`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ ...state, checkOnly: true }),
    }).then(r=>r.json());
    log('success', res.msg || '检查完成');
  } catch(e) {
    log('error', `检查失败: ${e.message}`);
  }
  btn.innerHTML = '<i class="fa-solid fa-magnifying-glass text-xs"></i> 检查远程更新';
  btn.disabled = false;
}

// ── 仅检查（dry run） ─────────────────────────────────────────
async function checkOnly() {
  log('info', '执行 git fetch 获取远程信息…');
  log('cmd', `$ git -C ${state.installDir} fetch --dry-run`);
  log('info', '（仅检查，不会修改本地文件）');
}

// ── 开始更新 ──────────────────────────────────────────────────
async function startUpdate() {
  if (state.running) return;
  state.running = true;

  // 重置步骤
  UPDATE_STEPS.forEach((_, i) => updateStep(i, 'idle'));
  document.getElementById('doneCard').classList.add('hidden');

  const btn = document.getElementById('btnUpdate');
  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner spin text-sm"></i> 更新中…';
  document.getElementById('btnRetry').classList.add('hidden');
  document.getElementById('configPanel').style.opacity = '0.5';
  document.getElementById('configPanel').style.pointerEvents = 'none';
  setBadge('overallBadge','running','更新中');
  setBadge('stepBadge','running','执行中');
  setProgress(0);

  log('highlight', '\n▶ 开始更新 GPT-SoVITS');
  log('info', `  设备: ${state.device} | 源: ${state.source}`);
  log('info', `  目录: ${state.installDir}`);

  try {
    await fetch(`${BACKEND}/update`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ device:state.device, source:state.source, installDir:state.installDir, dlUVR5:state.dlUVR5 }),
    });
  } catch(e) {
    log('error', `请求失败: ${e.message}`);
    state.running = false;
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-down text-sm"></i> 开始更新';
    document.getElementById('configPanel').style.opacity = '1';
    document.getElementById('configPanel').style.pointerEvents = 'auto';
  }
}

// ── SSE ───────────────────────────────────────────────────────
function connectSSE() {
  const sse = new EventSource(`${BACKEND}/events`);
  sse.onopen = () => log('success', '✓ 已连接后端服务');
  sse.onmessage = e => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type==='log') {
        log(msg.level||'info', msg.msg||'');
      } else if (msg.type==='update_step') {
        updateStep(msg.idx, msg.status);
        if (msg.status==='running') setBadge('stepBadge','running',`${msg.title}…`);
        if (msg.status==='done')    setBadge('stepBadge','done',`${msg.title} ✓`);
        if (msg.status==='error')   setBadge('stepBadge','error','失败');
      } else if (msg.type==='update_progress') {
        setProgress(msg.pct);
      } else if (msg.type==='update_done') {
        state.running = false;
        setBadge('overallBadge','done','更新完成');
        setProgress(100);
        document.getElementById('btnUpdate').classList.add('hidden');
        document.getElementById('configPanel').style.opacity = '1';
        document.getElementById('configPanel').style.pointerEvents = 'auto';
        // 刷新版本信息
        loadStatus();
        setTimeout(() => {
          document.getElementById('doneCard').classList.remove('hidden');
          document.getElementById('doneCard').classList.add('fade-in');
        }, 500);
      } else if (msg.type==='update_error') {
        state.running = false;
        setBadge('overallBadge','error','更新失败');
        setBadge('stepBadge','error','失败');
        document.getElementById('btnRetry').classList.remove('hidden');
        const btn = document.getElementById('btnUpdate');
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-down text-sm"></i> 开始更新';
        document.getElementById('configPanel').style.opacity = '1';
        document.getElementById('configPanel').style.pointerEvents = 'auto';
      }
    } catch(_) {}
  };
  sse.onerror = () => {};
}

// ── 工具函数 ──────────────────────────────────────────────────
function log(type, msg) {
  const t = document.getElementById('terminal');
  const d = document.createElement('div');
  const time = new Date().toLocaleTimeString('zh',{hour12:false});
  const cls = {info:'log-info',success:'log-success',warn:'log-warn',error:'log-error',cmd:'log-cmd',highlight:'log-highlight'};
  d.className = cls[type]||'log-info';
  d.innerHTML = `<span style="color:#334155;font-size:11px">${time}</span> ${escHtml(msg)}`;
  t.appendChild(d); t.scrollTop = t.scrollHeight;
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setProgress(pct) {
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressPct').textContent = pct+'%';
}
function setBadge(id, type, label) {
  const el = document.getElementById(id);
  const map = {idle:'badge-idle',running:'badge-running',done:'badge-done',error:'badge-error'};
  const dot = {idle:'#64748b',running:'#60a5fa',done:'#22c55e',error:'#ef4444'};
  el.className = `badge ${map[type]}`;
  el.innerHTML = `<span class="w-1.5 h-1.5 rounded-full" style="background:${dot[type]}"></span>${label}`;
}
function selectPill(gid, val) {
  document.getElementById(gid).querySelectorAll('.option-pill').forEach(b => b.classList.toggle('selected', b.dataset.val===val));
}
</script>
